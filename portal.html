// Convert any picked image (including iPhone HEIC) to a web-friendly JPEG via canvas.
// Runs on the phone where the browser can decode HEIC; if a browser can't decode
// the format it safely falls back to uploading the original file.
async function toJpeg(file){
  if(!file) return file;
  var isPdf = (file.type==='application/pdf') || /\.pdf$/i.test(file.name||'');
  if(isPdf){
    try{
      var mod = window.__pdfjs || await import('https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.mjs');
      window.__pdfjs = mod;
      try{ mod.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.worker.min.mjs'; }catch(e){}
      var pbuf = await file.arrayBuffer();
      var pdf = await mod.getDocument({data:new Uint8Array(pbuf)}).promise;
      var page = await pdf.getPage(1);
      var vp = page.getViewport({scale:2});
      var pcv = document.createElement('canvas'); pcv.width=vp.width; pcv.height=vp.height;
      await page.render({canvasContext:pcv.getContext('2d'), viewport:vp}).promise;
      var pblob = await new Promise(function(r){ pcv.toBlob(function(b){r(b);},'image/jpeg',0.9); });
      return pblob ? new File([pblob],'doc.jpg',{type:'image/jpeg'}) : file;
    }catch(e){ return file; }
  }
  if(file.type && file.type.indexOf('image/')!==0 && !/\.(heic|heif)$/i.test(file.name||'')) return file;
  return await new Promise(function(resolve){
    var url=URL.createObjectURL(file);
    var img=new Image();
    img.onload=function(){
      try{
        var maxW=1600, w=img.naturalWidth, h=img.naturalHeight;
        if(!w||!h){ URL.revokeObjectURL(url); resolve(file); return; }
        if(w>maxW){ h=Math.round(h*maxW/w); w=maxW; }
        var cv=document.createElement('canvas'); cv.width=w; cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        cv.toBlob(function(b){ URL.revokeObjectURL(url); resolve(b?new File([b],(file.name||'photo').replace(/\.[^.]+$/,'')+'.jpg',{type:'image/jpeg'}):file); },'image/jpeg',0.85);
      }catch(e){ URL.revokeObjectURL(url); resolve(file); }
    };
    img.onerror=function(){ URL.revokeObjectURL(url); resolve(file); };
    img.src=url;
  });
}

function normalizePhone(p) { return p.replace(/\D/g,''); }
function today() { return new Date().toISOString().split('T')[0]; }
function addDays(dateStr,n) { const d=new Date(dateStr+'T12:00:00'); d.setDate(d.getDate()+n); return d.toISOString().split('T')[0]; }
function formatDate(d) { if(!d) return '—'; const [y,m,day]=d.split('-'); return `${m}/${day}/${y}`; }
function formatMoney(n) { return '$'+Number(n).toLocaleString('en-US'); }
function daysUntil(dateStr) { if(!dateStr) return 999; const now=new Date(); now.setHours(0,0,0,0); const d=new Date(dateStr+'T00:00:00'); return Math.round((d-now)/86400000); }
function getPaidDates(c) { return new Set((c.payments||[]).map(p=>p.schedDate).filter(Boolean)); }
function getNextPayDate(c) { const s=c.schedule||[]; const pd=getPaidDates(c); for(const d of s){if(!pd.has(d))return d;} return s[s.length-1]||null; }
function getPaidCount(c) { return (c.payments||[]).filter(p=>p.schedDate).length; }
// Misma definicion que el CRM y que el contrato. Un solo numero para todos.
function totalOfPayments(c) {
  if((c.freq||'') === 'cash') return Number(c.total)||0;
  if(Number(c.totalOfPayments) > 0) return Number(c.totalOfPayments);
  return (Number(c.weekly)||0) * ((c.schedule||[]).length);
}
function calcPaid(c) { return (c.payments||[]).reduce((s,p)=>s+(Number(p.amount)||0),0); }
function clientVehicles(c){
  const list=[]; const seen=new Set();
  const pl=[c.year,c.make,c.model].filter(Boolean).join(' ');
  const pvin=(c.vin||'').toUpperCase();
  if(pl||pvin){ list.push({vin:pvin, label:(pl||('VIN …'+pvin.slice(-6)))}); if(pvin) seen.add(pvin); }
  (c.vehicles||[]).forEach(v=>{ const k=(v.vin||'').toUpperCase(); if(k&&seen.has(k))return; if(k)seen.add(k); list.push({vin:k, label:(v.label||[v.year,v.make,v.model].filter(Boolean).join(' ')||('VIN …'+k.slice(-6)))}); });
  return list;
}
function isLegacyPaidOff(c) {   // misma red de seguridad que el CRM
  return !Number(c.totalOfPayments) && (c.schedule||[]).length > 0
      && (c.payments||[]).filter(p=>p.schedDate).length >= (c.schedule||[]).length;
}
function calcBalance(c) {
  if(c.settled === true || isLegacyPaidOff(c)) return 0;
  if((c.freq||'') === 'cash') return 0;
  return Math.max(0, totalOfPayments(c) - calcPaid(c));
}
function dueNow(c){ const w=Number(c.weekly)||0; const b=calcBalance(c); return Math.max(0, Math.min(w, b)); }
function calcProgress(c) {
  if(c.settled === true || isLegacyPaidOff(c)) return 100;
  const tp = totalOfPayments(c);
  if(!tp) return 0;
  return Math.min(100, Math.round(calcPaid(c)/tp*100));
}
function getStatus(c) { const n=getNextPayDate(c); if(!n) return 'ok'; const d=daysUntil(n); if(d<0) return 'overdue'; if(d<=3) return 'soon'; return 'ok'; }

window.formatPhone=function(el){
  let d=(el.value||'').replace(/[^0-9]/g,'');
  if(d.length===11 && d[0]==='1') d=d.slice(1);
  d=d.slice(0,10);
  let out;
  if(d.length>6) out='('+d.slice(0,3)+') '+d.slice(3,6)+'-'+d.slice(6);
  else if(d.length>3) out='('+d.slice(0,3)+') '+d.slice(3);
  else if(d.length>0) out='('+d;
  else out='';
  el.value=out;
};
window.sendCode = async function(){
  const digits = String(document.getElementById('l-phone').value||'').replace(/\D/g,'');
  showLoginError('');
  let e164='';
  if(digits.length===10) e164='+1'+digits;
  else if(digits.length===11 && digits[0]==='1') e164='+'+digits;
  else { showLoginError(t('errPhone')); return; }
  const btn=document.getElementById('send-code-btn'); btn.disabled=true; btn.textContent=t('lgSending');
  try{
    // "Mantener sesion" = la sesion sobrevive al cerrar el navegador. Si no, muere al cerrarlo.
    const keep = document.getElementById('l-keep') ? document.getElementById('l-keep').checked : true;
    await setPersistence(auth, keep ? browserLocalPersistence : browserSessionPersistence);
    if(!window._recaptcha){ window._recaptcha = new RecaptchaVerifier(auth, 'recaptcha-container', {size:'invisible'}); }
    confirmationResult = await signInWithPhoneNumber(auth, e164, window._recaptcha);
    document.getElementById('step-phone').style.display='none';
    document.getElementById('step-code').style.display='block';
    const cf=document.getElementById('l-code'); if(cf) cf.focus();
  }catch(err){
    const code = err.code || '';
    showLoginError(code === 'auth/too-many-requests' ? t('errTooMany')
      : code === 'auth/invalid-phone-number' ? t('errBadPhone')
      : t('errSendFail'));
    try{ if(window._recaptcha){ window._recaptcha.clear(); window._recaptcha=null; } }catch(_){}
  }
  btn.disabled=false; btn.textContent=t('lgSend');
};

window.verifyCode = async function(){
  const code = String(document.getElementById('l-code').value||'').trim();
  showLoginError('');
  if(!code || !confirmationResult){ showLoginError(t('errCodeEmpty')); return; }
  const btn=document.getElementById('verify-code-btn'); btn.disabled=true; btn.textContent=t('lgVerifying');
  try{
    await confirmationResult.confirm(code);
    // onAuthStateChanged carga el portal
  }catch(err){
    showLoginError(t('errCodeBad'));
  }
  btn.disabled=false; btn.textContent=t('lgVerify');
};

// Al verificar el SMS cargamos SOLO su expediente (las reglas solo permiten el que coincide con su teléfono)
onAuthStateChanged(auth, async (user)=>{
  if(!user || !user.phoneNumber){
    document.getElementById('app').style.display='none';
    document.getElementById('login-screen').style.display='flex';
    return;
  }
  try{
    const qs = await getDocs(query(collection(db,'clients'), where('phoneE164','==', user.phoneNumber)));
    if(qs.empty){ showLoginError(t('errNoAccount')); await signOut(auth); return; }
    currentClient = { id: qs.docs[0].id, ...qs.docs[0].data() };
    setLang(localStorage.getItem('lmg_lang_' + currentClient.id) || (currentClient.lang === 'en' ? 'en' : 'es'));
    try{ const aq = await getDocs(query(collection(db,'appointments'), where('phoneE164','==', user.phoneNumber))); serviceAppointments = aq.docs.map(d=>d.data()); }catch(e){ serviceAppointments=[]; }
    showLoginError('');
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    renderPortal(); updateInsuranceDisplay(); updateIDDisplay(); updateSmsDisplay(); maybeAskConsent();
    try{ await updateDoc(doc(db,'clients',currentClient.id), { lastLogin: new Date().toISOString() }); }catch(e){}
  }catch(e){ showLoginError(t('errConn')); }
});

function updateInsuranceDisplay() {
  const c = currentClient;
  if(!c) return;
  const _insForm=document.getElementById('ins-edit-form');
  if(_insForm && !_insForm.dataset.userOpen) _insForm.style.display = c.insurance ? 'none' : 'block';
  const badge = document.getElementById('ins-badge');
  const current = document.getElementById('ins-current');
  const expEl = document.getElementById('ins-exp');
  if(!badge) return;

  const todayStr = today();
  if(!c.insurance) {
    badge.className='insurance-badge ins-none';
    badge.textContent=t('insNone');
    current.textContent=t('insNoRecord');
    expEl.textContent=t('insPleaseUpdate');
  } else {
    const daysLeft = c.insuranceExp ? Math.round((new Date(c.insuranceExp+'T00:00:00')-new Date(todayStr+'T00:00:00'))/86400000) : 999;
    if(daysLeft < 0) {
      badge.className='insurance-badge ins-expired';
      badge.textContent=t('insExpired');
    } else if(daysLeft <= 30) {
      badge.className='insurance-badge ins-soon';
      badge.textContent=t('insSoon')(daysLeft);
    } else {
      badge.className='insurance-badge ins-active';
      badge.textContent=t('insActive');
    }
    current.textContent=`${c.insuranceCompany||''}${c.insurance?' · '+t('policyWord')+': '+c.insurance:''}`;
    // Show photo if exists
    const preview = document.getElementById('ins-photo-preview');
    if(preview && c.insurancePhotoURL) {
      preview.innerHTML = `<a href="${c.insurancePhotoURL}" target="_blank" style="display:inline-flex;align-items:center;gap:6px;background:rgba(0,200,83,0.1);color:var(--green);border:1px solid var(--green);border-radius:8px;padding:6px 12px;font-size:12px;text-decoration:none;">${t('viewPolicyPhoto')}</a>`;
    }
    expEl.textContent=c.insuranceExp?`${t('expiresWord')}: ${formatDate(c.insuranceExp)}`:'';
    // Pre-fill form
    if(document.getElementById('ins-company')) document.getElementById('ins-company').value = c.insuranceCompany||'';
    if(document.getElementById('ins-number')) document.getElementById('ins-number').value = c.insurance||'';
    if(document.getElementById('ins-exp-date')) document.getElementById('ins-exp-date').value = c.insuranceExp||'';
  }
}

function serviceStatusInfo(nextServ){
  const es=L!=='en';
  if(!nextServ) return {color:'var(--muted)', bg:'transparent', border:'var(--gold3)', anim:'', label:es?'Sin datos de servicio':'No service data', msg:es?'Aún no tenemos registro de tu último servicio.':'No last service on file yet.'};

function nextFridays(n){
  const out=[]; const base=new Date(); base.setHours(0,0,0,0);
  let add=(5-base.getDay()+7)%7;
  for(let i=0;i<n;i++){ const f=new Date(base); f.setDate(base.getDate()+add+i*7); out.push(f.getFullYear()+'-'+String(f.getMonth()+1).padStart(2,'0')+'-'+String(f.getDate()).padStart(2,'0')); }
  return out;
}
function serviceSlots(){ const out=[]; for(let h=9;h<16;h++){ for(let m=0;m<60;m+=15){ out.push(String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')); } } return out; }

        ? `<div style="border-top:1px solid var(--border);margin-top:14px;padding-top:12px;"><button onclick="togglePaySchedule()" id="pay-sched-btn" style="width:100%;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:11px;font-size:13px;cursor:pointer;">${L==='en'?'View payment history':'Ver historial de pagos'}</button><div id="pay-sched" style="display:none;margin-top:12px;">${scheduleItems}</div></div>`
        : `<div style="border-top:1px solid var(--border);margin-top:14px;padding-top:6px;">${scheduleItems}</div>`) : ''}
    </div>

    <!-- Seguro/ID COMPLETADOS abajo (minimizados) -->
    ${insComplete ? insSectionHTML : ''}
    ${idComplete ? idSectionHTML : ''}

    <!-- MENSAJES DE TEXTO (discreto) -->
    <div class="insurance-section" id="sms-section" style="margin-top:16px;padding:16px 20px;">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-weight:500;font-size:14px;color:var(--muted);">${t('smsTitle')}</span>
          <span id="sms-badge" class="insurance-badge"></span>
        </div>
        <button onclick="toggleSmsForm()" id="sms-edit-btn" style="background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;">✏️</button>
      </div>
      <div class="ins-success" id="sms-success" style="display:none;"></div>
      <div class="ins-form" id="sms-edit-form" style="display:none;margin-top:12px;">
        <div style="font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:12px;">${t('smsDesc')} <strong style="color:var(--white);">${c.phone || ''}</strong></div>
        <label style="display:flex;align-items:flex-start;gap:12px;cursor:pointer;background:rgba(232,182,74,0.06);border:1px solid var(--border);border-radius:12px;padding:14px;">
          <input type="checkbox" id="sms-opt" style="width:20px;height:20px;margin-top:2px;flex:none;cursor:pointer;">
          <span style="font-size:13px;line-height:1.5;color:var(--white);">${t('smsAgree')}</span>
        </label>
        <div style="font-size:11px;color:var(--muted);margin-top:12px;line-height:1.55;">${t('smsFreq')} ${t('smsStop')}<br><br>⚖️ ${t('smsNotRequired')}</div>
        <a href="sms-terms.html" target="_blank" style="display:inline-block;font-size:12px;color:var(--gold);margin-top:10px;">${t('smsFullTerms')}</a>
        <button class="ins-btn" onclick="saveSmsConsent()">${t('save')}</button>
      </div>
    </div>

    <!-- CONTACTO (discreto) -->
    <div style="text-align:center;margin-top:20px;">
      <a onclick="location.href='sms:${dealerPhone}?body=${encodeURIComponent(t('contactMsg')(c))}'" style="font-size:13px;color:var(--muted);text-decoration:underline;cursor:pointer;">${t('contactBtn')}</a>
    </div>
  `;
}

// ---- CONSENTIMIENTO SMS (TCPA) ----
const SMS_CONSENT_VERSION = 'sms-consent-v1';

function updateSmsDisplay() {
  const badge = document.getElementById('sms-badge');
  if(!badge || !currentClient) return;
  const on = !!(currentClient.smsConsent && currentClient.smsConsent.marketing);
  badge.textContent = on ? t('smsOn') : t('smsOff');
  badge.className = 'insurance-badge ' + (on ? 'ins-active' : 'ins-none');
  const cb = document.getElementById('sms-opt');
  if(cb) cb.checked = on;
}

// Escribe UNA decision: renglon inmutable en la bitacora + estado actual derivado.
async function writeConsent(on, origin) {
  const now = new Date().toISOString();
  const phoneE164 = (auth.currentUser && auth.currentUser.phoneNumber) || currentClient.phoneE164 || '';
  const state = { marketing: on, date: now, source: 'portal', phoneE164, version: SMS_CONSENT_VERSION };
  await setDoc(doc(db, 'clients', currentClient.id, 'consents', String(Date.now())), {
    ...state,
    action: on ? 'opt_in' : 'opt_out',
    origin,
    userAgent: String(navigator.userAgent || '').slice(0, 300),
    language: navigator.language || ''
  });
  await updateDoc(doc(db, 'clients', currentClient.id), { smsConsent: state });
  currentClient.smsConsent = state;
  updateSmsDisplay();
}

// Solo pregunta si NUNCA ha contestado. Un "no" tambien cuenta como respuesta: no se vuelve a preguntar.
function maybeAskConsent() {
  if(!currentClient) return;
  const sc = currentClient.smsConsent;
  if(sc && sc.date) return;
  const phone = currentClient.phone || currentClient.phoneE164 || '';
  const title = t('smsTitle').replace('💬 ', '');
  document.getElementById('consent-modal-box').innerHTML = `
    <div style="font-size:36px;text-align:center;margin-bottom:10px;">💬</div>
    <div style="font-family:var(--font-display);font-size:24px;color:var(--white);text-align:center;font-weight:300;">${title}</div>
    <div style="font-size:15px;color:var(--muted);line-height:1.55;margin-top:20px;">
      ${t('modalQuestion')} <strong style="color:var(--white);">${phone}</strong>?
    </div>
    <div style="font-size:12px;color:var(--muted);line-height:1.6;margin-top:16px;">${t('smsAgree')}</div>
    <div style="font-size:12px;color:var(--muted);line-height:1.6;margin-top:10px;">${t('smsFreq')} ${t('smsStop')}</div>
    <div style="background:rgba(232,182,74,0.07);border:1px solid var(--border);border-radius:12px;padding:13px;margin-top:16px;font-size:12px;color:var(--muted);line-height:1.6;">
      ⚖️ ${t('smsNotRequired')}<br><br>${t('modalNoChange')}
    </div>
    <a href="sms-terms.html" target="_blank" style="display:block;text-align:center;font-size:12px;color:var(--gold);margin-top:14px;">${t('smsFullTerms')}</a>
    <button onclick="answerConsent(true)" style="width:100%;background:linear-gradient(135deg,var(--gold3),var(--gold));color:var(--navy3);border:none;border-radius:12px;padding:15px;font-family:var(--font-display);font-size:18px;cursor:pointer;margin-top:18px;">${t('modalYes')}</button>
    <button onclick="answerConsent(false)" style="width:100%;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:12px;padding:13px;font-size:14px;cursor:pointer;margin-top:10px;">${t('modalNo')}</button>
    <div style="font-size:11px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.5;">${t('modalLater')}</div>
    <div id="consent-modal-err" style="display:none;color:var(--red);font-size:12px;text-align:center;margin-top:10px;"></div>
  `;
  document.getElementById('consent-modal').style.display = 'flex';
  document.body.style.overflow = 'hidden';   // no puede seguir sin contestar
}

window.answerConsent = async function(accept) {
  try {
    await writeConsent(!!accept, 'portal_first_login');
    document.getElementById('consent-modal').style.display = 'none';
    document.body.style.overflow = '';
  } catch(e) {
    const err = document.getElementById('consent-modal-err');
    err.textContent = t('errSave') + e.message;
    err.style.display = 'block';
  }
};

window.saveSmsConsent = async function() {
  const on = !!document.getElementById('sms-opt').checked;
  const box = document.getElementById('sms-success');
  try {
    await writeConsent(on, 'settings_card');
    box.textContent = on ? t('smsSavedYes') : t('smsSavedNo');
    box.style.color = 'var(--green)';
  } catch(e) {
    box.textContent = t('errSave') + e.message;
    box.style.color = 'var(--red)';
  }
  box.style.display = 'block';
  setTimeout(() => { box.style.display = 'none'; }, 5000);
};
</script></script>

<style>

  *{box-sizing:border-box;} body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;-webkit-text-size-adjust:100%;}
  .wrap{max-width:760px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 2px) 16px calc(84px + env(safe-area-inset-bottom));}
  #login{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:calc(env(safe-area-inset-top) + 20px) 24px calc(20px + env(safe-area-inset-bottom));background:radial-gradient(ellipse at 50% -10%,#161d2e,var(--bg) 55%);}
  /* Barra de navegación inferior — solo dueños */

  <span onclick="installApp()" style="cursor:pointer;" data-i18n="installApp">📲 Instalar Warehouse como app</span>
  <button onclick="dismissInstall(event)" title="Cerrar" style="position:absolute;top:50%;right:8px;transform:translateY(-50%);background:rgba(0,0,0,.18);color:#0b0e14;border:none;border-radius:50%;width:26px;height:26px;font-size:14px;font-weight:800;cursor:pointer;line-height:1;">✕</button>

    <label data-i18n="email">Correo</label><input id="l-email" type="email" autocomplete="username">
    <label data-i18n="pass">Contraseña</label><input id="l-pass" type="password" autocomplete="current-password">
    <div id="l-err" style="color:var(--red);font-size:13px;min-height:18px;margin:8px 0;"></div>
    <button class="btn" style="width:100%;" onclick="doLogin()" data-i18n="enter">Entrar</button>
  </div>
</div>

      <button class="btn ghost sm" onclick="doLogout()" data-i18n="logout">Salir</button>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>

      <div id="addcar-body" style="margin-top:8px;">

      <div class="row2" style="margin-top:8px;">
        <button class="btn ghost sm" onclick="scanVin()" data-i18n="scanVinBtn">📠 Escanear VIN</button>

      <div id="vin-cam-wrap" style="display:none;position:relative;margin-top:8px;">

      </div>
      <div id="v-decode-msg" class="sub" style="margin-top:4px;"></div>
      <div id="v-spec" style="margin-top:6px;display:flex;gap:5px;flex-wrap:wrap;"></div>

      </div>
      <div class="row2">
        <div><label data-i18n="miles">Millas (si se sabe)</label><input id="v-miles" type="number" inputmode="numeric" placeholder="145000"></div>
        <div><label data-i18n="engine">Motor (opcional)</label><input id="v-engine"></div>
      </div>
      <div class="row2">
        <div><label data-i18n="color">Color</label><input id="v-color" data-i18n-ph="colorPh" placeholder="Ej. Blanco"></div>
        <div><label data-i18n="colorCode">Código de color (opc.)</label><input id="v-colorcode"></div>
      </div>
      <label data-i18n="carPhoto">📷 Foto del carro</label>
      <div style="display:flex;gap:8px;">
        <button type="button" class="btn ghost sm" style="flex:1" onclick="document.getElementById('v-cam').click()" data-i18n="takePhoto">📷 Cámara</button>
        <button type="button" class="btn ghost sm" style="flex:1" onclick="document.getElementById('v-photos').click()" data-i18n="fromGallery">🖼️ Galería</button>
      </div>
      <input type="file" id="v-cam" accept="image/*" capture="environment" multiple style="display:none" onchange="addCarPhotos(this)">
      <input type="file" id="v-photos" accept="image/*" multiple style="display:none" onchange="addCarPhotos(this)">
      <div id="v-prev" class="thumbs"></div>
      <button class="btn" style="width:100%;margin-top:12px;" id="v-save" onclick="saveVehicle()" data-i18n="saveCar">Guardar carro</button>
      </div>
    </div>
    <button id="cars-toggle" onclick="toggleCarsList()" class="card" style="width:100%;text-align:left;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-weight:800;color:var(--text);">

    <div id="lister-list"></div>
  </div>

    <div class="card" style="margin-bottom:12px;">

      <div class="sub" style="margin-bottom:8px;" data-i18n="scanHint">Escanea el QR para ver dónde está.</div>

        <input id="scan-input" name="scancode" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" data-1p-ignore data-lpignore="true" data-i18n-ph="scanPh" placeholder="Escanea o pega el código…" onkeydown="if(event.key==='Enter')scanLookup()">

      <div id="cam-wrap" style="display:none;position:relative;margin-top:8px;">

      </div>
      <button class="btn ghost sm" style="width:100%;margin-top:10px;" onclick="startReloc()" data-i18n="relocMode">🔄 Reubicar producto</button>
    </div>
    <div id="pack-result"></div>
    <div id="pack-pending" style="margin-top:14px;"></div>
  </div>

  <!-- ===================== CARRO (página completa) ===================== -->
  <div id="view-car" style="display:none;"></div>

<!-- Modal genérico (ficha VIN / agregar parte) -->

  <div id="modal-inner" class="card" style="max-width:600px;margin:20px auto;"></div>
</div>
<!-- Modal secundario (etiqueta) — encima del formulario, sin destruirlo -->
<div id="modal2" style="display:none;position:fixed;inset:0;z-index:9700;background:rgba(0,0,0,.7);padding:14px;overflow:auto;" onclick="if(event.target===this)closeModal2()">
  <div id="modal2-inner" class="card" style="max-width:520px;margin:20px auto;"></div>
</div>
<!-- Área que se imprime (solo el QR) -->
<div id="print-area"></div>

</nav>

// ---- VIN decode (NHTSA, GRATIS) — captura la ficha completa ----
let _vSpec=null;   // ficha decodificada del carro actual (para guardarla y heredarla a las partes)
window.decodeVin=async function(){
  const vin=(document.getElementById('v-vin').value||'').trim().toUpperCase();
  const msg=document.getElementById('v-decode-msg');
  if(vin.length<11){ msg.textContent=t('vinShort'); return; }
  msg.textContent=t('decoding');
  try{
    const r=await fetch('https://vpic.nhtsa.dot.gov/api/vehicles/decodevin/'+encodeURIComponent(vin)+'?format=json');
    const j=await r.json(); const results=(j.Results||[]);
    const g=k=>{ const it=results.find(x=>x.Variable===k); return ((it&&it.Value)||'').trim(); };
    const year=g('Model Year'), make=g('Make'), model=g('Model');
    const displ=g('Displacement (L)'), cyl=g('Engine Number of Cylinders'), fuel=g('Fuel Type - Primary'), hp=g('Engine Brake (hp) From')||g('Engine Brake (hp)');
    const engine=[displ&&(Math.round(parseFloat(displ)*10)/10+'L'), cyl&&cyl+'cyl', fuel].filter(Boolean).join(' ');
    // TODA la ficha, campo por campo (se descartan vacíos y ruido administrativo)
    const EXCLUDE=new Set(['Error Code','Error Text','Additional Error Text','Suggested VIN','Vehicle Descriptor','Note','Possible Values','Destination Market','NCSA Body Type','NCSA Make','NCSA Model','NCSA Note','Base Price ($)']);
    const bad=v=>{ v=(v||'').trim(); return !v || v==='0' || /^not applicable$/i.test(v) || /^0\.0*$/.test(v); };
    const all=results.filter(x=>!EXCLUDE.has(x.Variable) && !bad(x.Value)).map(x=>({label:x.Variable, value:x.Value.trim()}));
    const spec={ vin, source:'nhtsa',
      trim:g('Trim')||g('Series'), series:g('Series'), bodyClass:g('Body Class'), doors:g('Doors'),
      drive:g('Drive Type'), transmission:g('Transmission Style'),
      displacementL:displ, cylinders:cyl, fuel:fuel, hp:hp,
      gvwr:g('Gross Vehicle Weight Rating From'), plant:g('Plant Country'), vehicleType:g('Vehicle Type'), manufacturer:g('Manufacturer Name'),
      all };   // ← lista completa (Nivel 2 mergeará más aquí)
    if(year) document.getElementById('v-year').value=year;
    if(make) document.getElementById('v-make').value=titleCase(make);
    if(model) document.getElementById('v-model').value=titleCase(model);
    if(engine) document.getElementById('v-engine').value=engine.trim();
    _vSpec=spec; renderVSpec(spec);
    msg.textContent = (year||make||model) ? t('decodeOk') : t('decodeNone');
  }catch(e){ msg.textContent=t('decodeErr'); _vSpec=null; renderVSpec(null); }
};
// Muestra TODA la ficha, un apartado por renglón
function renderVSpec(s){
  const box=document.getElementById('v-spec'); if(!box) return;
  if(!s || !s.all || !s.all.length){ box.innerHTML=''; return; }
  box.innerHTML='<div style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px 10px;max-height:42vh;overflow:auto;">'
    +'<div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--faint);margin-bottom:6px;">'+t('vinFicha')+' ('+s.all.length+')</div>'
    +s.all.map(f=>`<div style="display:flex;justify-content:space-between;gap:12px;font-size:13px;padding:4px 0;border-bottom:1px solid var(--border);"><span class="muted">${f.label}</span><span style="font-weight:600;text-align:right;">${f.value}</span></div>`).join('')
    +'</div>';
}
function titleCase(s){ return String(s||'').toLowerCase().replace(/\b\w/g,c=>c.toUpperCase()); }

window.scanVin=async function(){
  const vid=document.getElementById('vin-cam'); const msg=document.getElementById('v-decode-msg');
  document.getElementById('vin-cam-wrap').style.display=''; msg.textContent=t('vinScanPoint');
  const hit=raw=>{ raw=(raw||'').toUpperCase().replace(/[^A-Z0-9]/g,''); if(raw.length>17) raw=raw.slice(-17); if(raw.length<11) return false; document.getElementById('v-vin').value=raw; stopVinCam(); msg.textContent=''; decodeVin(); return true; };
  try{
    if('BarcodeDetector' in window){
      _vinCamStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
      vid.srcObject=_vinCamStream; await vid.play();
      const det=new window.BarcodeDetector();   // todos los formatos (VIN suele ser Code39/PDF417/DataMatrix)
      const tick=async()=>{ if(!_vinCamStream) return; try{ const codes=await det.detect(vid); if(codes&&codes.length && hit(codes[0].rawValue)) return; }catch(e){} requestAnimationFrame(tick); }; tick();
    } else {
      // iPhone → ZXing
      await ensureZXing();
      _vinReader=new window.ZXing.BrowserMultiFormatReader();
      const cb=(result)=>{ if(result) hit(result.getText()); };
      try{ await _vinReader.decodeFromConstraints({video:{facingMode:'environment'}}, vid, cb); }
      catch(e){ await _vinReader.decodeFromVideoDevice(undefined, vid, cb); }
    }
  }catch(e){ stopVinCam(); msg.textContent=''; alert(t('noCamera')); const f=document.getElementById('v-vin'); if(f) f.focus(); }
};
window.stopVinCam=function(){
  if(_vinCamStream){ _vinCamStream.getTracks().forEach(tr=>tr.stop()); _vinCamStream=null; }
  if(_vinReader){ try{ _vinReader.reset(); }catch(e){} _vinReader=null; }
  const vid=document.getElementById('vin-cam'); if(vid){ try{ vid.srcObject=null; }catch(e){} }
  const w=document.getElementById('vin-cam-wrap'); if(w) w.style.display='none';
  const m=document.getElementById('v-decode-msg'); if(m && m.textContent===t('vinScanPoint')) m.textContent='';
};

// ---- Etiqueta imprimible (solo QR) para la Rongta R22 vía app (iPhone) ----
let _labelFile=null, _labelDataUrl='';
function labelWrap(g,text,cx,y,maxW,lineH,maxLines){
  const words=String(text||'').split(/\s+/).filter(Boolean); let lines=[], cur='';
  for(const w of words){ const test=cur?cur+' '+w:w; if(g.measureText(test).width>maxW && cur){ lines.push(cur); cur=w; } else cur=test; }
  if(cur) lines.push(cur);
  if(lines.length>maxLines){ lines=lines.slice(0,maxLines); lines[maxLines-1]=lines[maxLines-1].slice(0,-1)+'…'; }
  lines.forEach((ln,i)=>g.fillText(ln,cx,y+i*lineH));
  return y+lines.length*lineH;
}
window.printPartLabel=async function(id){ const p=parts.find(x=>x.id===id); if(p) await makeLabel(p); };
async function makeLabel(p){
  try{
    const durl=await qrDataUrl(partScanURL(p.id));   // QR = enlace (cámara del iPhone abre la app); local para evitar CORS
    const qrImg=await new Promise((res,rej)=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=rej; i.src=durl; });
    // Cabezal R22 = 48mm / 384 puntos a 203dpi. La imagen NO debe pasar de 384 px de ancho
    // o la impresora descarta el trabajo (se ve en preview pero no imprime). Alto 30mm ≈ 240 px.
    const LW=384, LH=240, qs=224, ox=(LW-qs)/2, oy=(LH-qs)/2;
    const c=document.createElement('canvas'); c.width=LW; c.height=LH;
    const g=c.getContext('2d'); g.fillStyle='#fff'; g.fillRect(0,0,LW,LH);
    g.drawImage(qrImg, ox, oy, qs, qs);
    // Umbral a blanco/negro PURO (sin grises) — lo que la térmica imprime sin fallar
    try{ const im=g.getImageData(0,0,LW,LH), d=im.data;
      for(let i=0;i<d.length;i+=4){ const lum=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2], v=lum<128?0:255; d[i]=d[i+1]=d[i+2]=v; d[i+3]=255; }
      g.putImageData(im,0,0);
    }catch(e){}
    const dataUrl=c.toDataURL('image/jpeg',1.0);
    const blob=await new Promise(r=>c.toBlob(r,'image/jpeg',1.0));
    _labelFile=blob?new File([blob],'etiqueta_'+p.id+'.jpg',{type:'image/jpeg'}):null;
    _labelDataUrl=dataUrl;
    const pa=document.getElementById('print-area'); if(pa) pa.innerHTML='<img src="'+dataUrl+'">';   // lo que se imprime
    document.getElementById('modal2-inner').innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;"><div style="font-weight:800;">🖨️ ${t('labelTitle')}</div><button class="btn ghost sm" onclick="closeModal2()">✕</button></div>
      <img src="${dataUrl}" style="width:100%;max-width:260px;display:block;margin:0 auto;border:1px solid var(--border);border-radius:8px;background:#fff;">
      <button class="btn" style="width:100%;margin-top:14px;" onclick="shareLabel()">${t('labelShare')}</button>
      <button class="btn ghost sm" style="width:100%;margin-top:8px;" onclick="copyScanLink('${p.id}',this)">${t('copyQrLink')}</button>
      <div class="sub" style="margin-top:10px;">${t('labelHint')}</div>`;
    document.getElementById('modal2').style.display='block';
  }catch(e){ alert(t('error')+e.message); }
};

// withPhotos=false → guarda datos + QR (queda escaneable YA). withPhotos=true → agrega las fotos encima.
async function upsertPart(vid, withPhotos){
  const v=vehicles.find(x=>x.id===vid); if(!v){ alert(t('carNotFound')); return null; }
  const name=(document.getElementById('p-name-'+vid).value||'').trim();
  if(!name){ alert(t('alertPart')); return null; }
  const sp=v.spec||{};
  const cond=document.getElementById('p-cond-'+vid).value;
  const num=(document.getElementById('p-num-'+vid).value||'').trim();
  const bin=(document.getElementById('p-bin-'+vid).value||'').trim().toUpperCase();
  const id=_newPartId || ('part_'+Date.now()+'_'+Math.random().toString(36).slice(2,5));
  _newPartId=id;
  const existing=parts.find(x=>x.id===id);
  // QR digital (una sola vez; su valor = el enlace con el id)
  let qrURL=(existing&&existing.qrURL)||'';
  if(!qrURL){
    const durl=await qrDataUrl(partScanURL(id));
    const blob=await (await fetch(durl)).blob();
    const qrRef=ref(storage,'parts/'+id+'/00_QR.gif'); await uploadBytes(qrRef, blob);
    qrURL=await getDownloadURL(qrRef);
  }
  // fotos: conserva las que ya tenía (sin el QR) + agrega las nuevas si aplica
  let photos=(existing&&existing.photoURLs)? existing.photoURLs.filter(u=>u && u!==qrURL && !/00_QR/.test(u)) : [];
  if(withPhotos){ for(const f of (_partFiles[vid]||[])){ const jpg=await toJpeg(f); const r=ref(storage,'parts/'+id+'/'+Date.now()+'_'+(jpg.name||'foto.jpg')); await uploadBytes(r,jpg); photos.push(await getDownloadURL(r)); } }
  const photoURLs=photos.slice(); photoURLs.push(qrURL);   // QR al final
  const ebayTitle=[v.year,v.make,v.model,sp.trim||'',name,(num?'OEM '+num:''),'-',cond].filter(Boolean).join(' ').replace(' - -',' -');
  await setDoc(doc(db,'parts',id), { entryId:id, vehicleId:vid, vehicleLabel:vehLabel(v),
    vYear:v.year||'', vMake:v.make||'', vModel:v.model||'', vMiles:v.miles||'',
    vTrim:sp.trim||'', vEngine:v.engine||'', vDrive:sp.drive||'', vTransmission:sp.transmission||'', vBody:sp.bodyClass||'', vSpec:v.spec||null,
    name, partNumber:num, condition:cond, notes:(existing&&existing.notes)||'', photoURLs, qrURL, ebayTitle,
    status:(existing&&existing.status)||'disponible', priceCents:(existing&&existing.priceCents!=null)?existing.priceCents:null,
    location:{bin}, createdAt:(existing&&existing.createdAt)||new Date().toISOString(), createdBy:(existing&&existing.createdBy)||myEmail });
  return {id, name, num, bin, sp, v};
}

async function toJpeg(file){
  try{
    const img=await new Promise((res,rej)=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=rej; i.src=URL.createObjectURL(file); });
    const max=1400, sc=Math.min(1,max/Math.max(img.width,img.height));
    const c=document.createElement('canvas'); c.width=Math.round(img.width*sc); c.height=Math.round(img.height*sc);
    c.getContext('2d').drawImage(img,0,0,c.width,c.height);
    const blob=await new Promise(r=>c.toBlob(r,'image/jpeg',0.82));
    return new File([blob],(file.name||'foto').replace(/\.\w+$/,'')+'.jpg',{type:'image/jpeg'});
  }catch(e){ return file; }
}

let _pendingConfirm='', _packMode='find';   // find = buscar parte vendida · reloc = reubicar
function scanId(raw){ let id=raw; const m=raw.match(/[?&]scan=([\w-]+)/) || raw.match(/part[=/]([\w-]+)/) || raw.match(/(part_\d+_[a-z0-9]+)/i); if(m) id=m[1]; return id; }
function partPhotoBig(p){ const u=(p.photoURLs||[]).find(x=>x&&!/00_QR/.test(x))||''; return u?`<img src="${u}" onclick="openPhoto('${u}')" style="width:100%;max-height:300px;object-fit:contain;border-radius:12px;background:#000;cursor:pointer;">`:`<div style="width:100%;height:160px;border-radius:12px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:48px;">🔧</div>`; }
function packTextMatch(raw){
  const q=(raw||'').trim().toLowerCase(); if(!q) return [];
  const w=q.split(/\s+/);
  return parts.filter(p=>{ const hay=((p.name||'')+' '+(p.partNumber||'')+' '+(p.ebayTitle||'')+' '+(p.vehicleLabel||'')+' '+((p.location&&p.location.bin)||'')).toLowerCase(); return w.every(x=>hay.indexOf(x)>=0); });
}
window.packPick=function(id){ const inp=document.getElementById('scan-input'); if(inp) inp.value=id; scanLookup(); };
window.scanLookup=function(){
  const inp=document.getElementById('scan-input'); const raw=(inp.value||'').trim();
  if(!raw) return;
  const id=scanId(raw);
  const exact=parts.find(x=>x.id===id || x.entryId===id);
  const box=document.getElementById('pack-result');
  // MODO CONFIRMAR: este escaneo debe coincidir con la parte (SOLO QR/código, no texto). Si no coincide, NO cancela — sigue escuchando.
  if(_pendingConfirm){
    inp.value='';
    const okId=_pendingConfirm;
    if(exact && exact.id===okId){ _pendingConfirm=''; try{ stopCam(); }catch(e){} sellPart(okId, exact); inp.focus(); return; }
    box.innerHTML='<div class="card" style="border-color:var(--red);"><div class="red" style="font-weight:800;font-size:15px;">'+t('wrongPart')+' '+(exact?(exact.vehicleLabel+' · '+exact.name):raw)+'</div><div class="sub" style="margin-top:6px;">'+t('keepScan')+'</div><button class="btn ghost sm" style="width:100%;margin-top:10px;" onclick="exitReloc()">'+t('closeResult')+'</button></div>';
    inp.focus(); try{ startCamScan(); }catch(e){}   // sigue escuchando con la cámara hasta que sea la correcta
    return;
  }
  // Resuelve por QR/código exacto o, si no, por TEXTO (nombre/número) — para cuando la etiqueta no se lee
  const cands = exact ? [exact] : packTextMatch(raw);
  inp.value='';
  if(!cands.length){ box.innerHTML='<div class="card"><div class="red">'+t('notFoundPart')+'</div><div class="sub">'+t('codeLbl')+': '+raw+'</div></div>'; inp.focus(); return; }
  if(cands.length>1){
    box.innerHTML='<div class="card"><div class="sub" style="margin-bottom:8px;">'+t('multiMatch')+' ('+cands.length+')</div>'+cands.slice(0,25).map(p=>{ const u=(p.photoURLs||[]).find(x=>x&&!/00_QR/.test(x))||''; const th=u?'<img src="'+u+'" style="width:44px;height:44px;object-fit:cover;border-radius:8px;flex:0 0 auto;">':'<div style="width:44px;height:44px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex:0 0 auto;">🔧</div>'; return '<div style="display:flex;gap:10px;align-items:center;padding:9px 2px;cursor:pointer;border-top:1px solid var(--border);" onclick="packPick(\''+p.id+'\')">'+th+'<div style="flex:1;min-width:0;"><div style="font-weight:700;">'+esc(p.name||'')+(p.partNumber?' · '+esc(p.partNumber):'')+'</div><div class="sub">'+esc(p.vehicleLabel||'')+' · 📍 '+locText(p)+'</div></div>'+statusTag(p.status)+'</div>'; }).join('')+'</div>';
    inp.focus(); return;
  }
  const p=cands[0];
  // MODO REUBICAR: cambiar el bin (función aparte de la tarea diaria)
  if(_packMode==='reloc'){
    box.innerHTML=`<div class="card">
      <div style="font-weight:800;">${p.vehicleLabel} · ${p.name}</div>
      <div style="font-size:16px;font-weight:800;color:var(--gold);margin:8px 0;">📍 ${locText(p)}</div>
      <label>${t('binLbl')}</label><input id="pk-bin" autocomplete="off" value="${(p.location&&p.location.bin)||''}" placeholder="${t('binPh')}">
      <button class="btn" style="width:100%;margin-top:8px;" onclick="saveLoc('${p.id}')">${t('relocBtn')}</button>
      <button class="btn ghost sm" style="width:100%;margin-top:8px;" onclick="exitReloc()">${t('closeResult')}</button>
    </div>`;
    return;
  }
  // MODO BUSCAR (diario): foto grande + dónde está + confirmar + no encontrada
  box.innerHTML=`<div class="card">
    ${partPhotoBig(p)}
    <div style="font-weight:800;font-size:19px;margin-top:10px;">${p.vehicleLabel} · ${p.name}</div>
    <div class="sub" style="margin:4px 0;">${condLabel(p.condition)}${p.partNumber?' · OEM '+p.partNumber:''}</div>
    <div style="font-size:24px;font-weight:800;color:var(--gold);margin:10px 0;">📍 ${locText(p)}</div>
    ${p.status!=='vendido'?`<button class="btn" style="width:100%;font-size:17px;padding:15px;" onclick="startConfirmSell('${p.id}')">${t('confirmSellBtn')}</button>`:''}
    <button class="btn ghost sm" style="width:100%;margin-top:8px;" onclick="markNotFound('${p.id}')">${t('notFoundBtn')}</button>
  </div>`;
};

// 🔄 Reubicar: función separada de buscar parte
window.startReloc=function(){
  _packMode='reloc'; _pendingConfirm='';
  document.getElementById('pack-result').innerHTML='<div class="card" style="border-color:var(--gold);"><div style="font-weight:800;">'+t('relocMode')+'</div><div class="sub" style="margin-top:6px;">'+t('relocHint')+'</div></div>';
  const s=document.getElementById('scan-input'); if(s){ s.value=''; s.focus(); }
};
window.exitReloc=function(){ _packMode='find'; _pendingConfirm=''; try{ stopCam(); }catch(e){} document.getElementById('pack-result').innerHTML=''; const s=document.getElementById('scan-input'); if(s) s.focus(); };
window.saveLoc=async function(id){
  const bin=(document.getElementById('pk-bin').value||'').trim().toUpperCase();
  try{ await updateDoc(doc(db,'parts',id),{location:{bin}}); document.getElementById('pack-result').innerHTML='<div class="card green">'+t('locSaved')+': '+t('binLbl')+' '+(bin||'?')+'</div>'; const s=document.getElementById('scan-input'); if(s) s.focus(); }
  catch(e){ alert(t('error')+e.message); }
};
// ❌ No la encontró → dejar pendiente (no se pierde; sale en la lista de abajo)
window.markNotFound=async function(id){
  try{ await updateDoc(doc(db,'parts',id),{packPending:true, packPendingAt:new Date().toISOString()});
    document.getElementById('pack-result').innerHTML='<div class="card"><div class="sub">'+t('leftPending')+'</div></div>';
    const s=document.getElementById('scan-input'); if(s) s.focus();
  }catch(e){ alert(t('error')+e.message); }
};
window.openPending=function(id){ _packMode='find'; _pendingConfirm=''; const inp=document.getElementById('scan-input'); if(inp){ inp.value=id; scanLookup(); } };
function renderPending(){
  const box=document.getElementById('pack-pending'); if(!box) return;
  const list=parts.filter(p=>p.packPending && p.status!=='vendido').sort((a,b)=>(b.packPendingAt||'').localeCompare(a.packPendingAt||''));
  if(!list.length){ box.innerHTML=''; return; }
  box.innerHTML='<div style="font-weight:800;margin:6px 2px 8px;">'+t('pendingTitle')+' ('+list.length+')</div>'
    +list.map(p=>{ const u=(p.photoURLs||[]).find(x=>x&&!/00_QR/.test(x))||''; return `<div class="part" style="display:flex;gap:10px;align-items:center;cursor:pointer;" onclick="openPending('${p.id}')">${u?`<img src="${u}" style="width:52px;height:52px;object-fit:cover;border-radius:8px;flex:0 0 auto;">`:'<div style="width:52px;height:52px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex:0 0 auto;">🔧</div>'}<div style="flex:1;min-width:0;"><div style="font-weight:700;">${p.vehicleLabel} · ${p.name}</div><div class="sub">📍 ${locText(p)}</div></div><span class="gold">▸</span></div>`; }).join('');
}
let _camStream=null;
window.startCamScan=async function(){
  const vid=document.getElementById('cam');
  document.getElementById('cam-wrap').style.display='';
  try{
    _camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    vid.srcObject=_camStream; await vid.play();
    if('BarcodeDetector' in window){
      const det=new window.BarcodeDetector({formats:['qr_code']});
      const tick=async()=>{ if(!_camStream) return; try{ const codes=await det.detect(vid); if(codes&&codes.length){ document.getElementById('scan-input').value=codes[0].rawValue; stopCam(); scanLookup(); return; } }catch(e){} requestAnimationFrame(tick); }; tick();
    } else {
      // iPhone → jsQR sobre los cuadros del video
      await ensureJsQR();
      const cv=document.createElement('canvas'); const cx=cv.getContext('2d',{willReadFrequently:true});
      const tick=()=>{ if(!_camStream) return;
        if(vid.videoWidth){ try{ cv.width=vid.videoWidth; cv.height=vid.videoHeight; cx.drawImage(vid,0,0,cv.width,cv.height); const img=cx.getImageData(0,0,cv.width,cv.height); const res=window.jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'}); if(res&&res.data){ document.getElementById('scan-input').value=res.data; stopCam(); scanLookup(); return; } }catch(e){} }
        requestAnimationFrame(tick);
      }; tick();
    }
  }catch(e){ stopCam(); alert(t('camErr')+e.message); }
};
window.stopCam=function(){ if(_camStream){ _camStream.getTracks().forEach(t=>t.stop()); _camStream=null; } const vid=document.getElementById('cam'); if(vid){ try{ vid.srcObject=null; }catch(e){} } const w=document.getElementById('cam-wrap'); if(w) w.style.display='none'; };
function stopCam(){ window.stopCam(); }

// Cerrar la cámara al tocar fuera del recuadro del video
document.addEventListener('click', function(ev){
  if(_vinCamStream||_vinReader){ const w=document.getElementById('vin-cam-wrap'); if(w && !w.contains(ev.target) && !(ev.target.closest && ev.target.closest('[onclick*="scanVin"]'))) window.stopVinCam(); }
  if(_camStream){ const w=document.getElementById('cam-wrap'); if(w && !w.contains(ev.target) && !(ev.target.closest && ev.target.closest('[onclick*="startCamScan"]'))) window.stopCam(); }
}, true);

// Aplicar idioma inicial (traduce estáticos + pone el toggle)
setLang(L);
</script>

<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Legacy Warehouse</title>
<link rel="manifest" href="manifest-warehouse.json">
<meta name="theme-color" content="#0b0e14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Warehouse">
<link rel="apple-touch-icon" href="wh-apple-touch-icon.png">
<style>
  :root{ --bg:#0b0e14; --surface:#12161f; --surface2:#1a1f2e; --border:rgba(255,255,255,0.09); --text:#e7ebf3; --muted:#95a0b5; --faint:#5b6577; --gold:#f0c040; --green:#3ecf8e; --red:#ff6b6b; }
  *{box-sizing:border-box;} body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;-webkit-text-size-adjust:100%;}
  .wrap{max-width:760px;margin:0 auto;padding:16px 16px 90px;}
  #login{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 50% -10%,#161d2e,var(--bg) 55%);}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;}
  input,select,textarea{width:100%;box-sizing:border-box;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 12px;color:var(--text);font-size:15px;}
  label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px;text-transform:uppercase;letter-spacing:.5px;}
  .btn{background:var(--gold);color:#0b0e14;border:none;border-radius:10px;padding:12px 16px;font-size:15px;font-weight:800;cursor:pointer;}
  .btn.ghost{background:transparent;color:var(--text);border:1px solid var(--border);font-weight:600;}
  .btn.sm{padding:7px 11px;font-size:13px;}
  .btn.green{background:rgba(62,207,142,0.15);color:var(--green);border:1px solid var(--green);}
  .row2{display:flex;gap:10px;flex-wrap:wrap;} .row2>*{flex:1;min-width:130px;}
  .title{font-size:24px;font-weight:800;letter-spacing:-.4px;}
  .sub{color:var(--muted);font-size:13px;}
  .tag{display:inline-block;font-size:11px;font-weight:700;border-radius:20px;padding:2px 9px;}
  .tag.dispon{background:rgba(240,192,64,.14);color:var(--gold);}
  .tag.public{background:rgba(62,207,142,.14);color:var(--green);}
  .tag.vend{background:rgba(255,107,107,.14);color:var(--red);}
  .chip{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:2px 8px;font-size:12px;color:var(--muted);}
  .tabs{display:flex;gap:8px;margin:0 0 14px;flex-wrap:wrap;}
  .tab{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;color:var(--muted);}
  .tab.on{background:var(--gold);color:#0b0e14;border-color:var(--gold);}
  .part{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;}
  .thumbs{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;} .thumbs img{width:54px;height:54px;object-fit:cover;border-radius:8px;border:1px solid var(--border);}
  .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px;}
  .muted{color:var(--muted);} .gold{color:var(--gold);} .green{color:var(--green);} .red{color:var(--red);}
  a{color:var(--gold);}
</style>
</head>
<body>

<div id="install-bar" onclick="installApp()" style="display:none;position:fixed;left:12px;right:12px;bottom:14px;z-index:9000;background:var(--gold);color:#0b0e14;border-radius:12px;padding:13px;text-align:center;font-weight:800;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.45);" data-i18n="installApp">📲 Instalar Warehouse como app</div>

<div id="login">
  <div class="card" style="max-width:360px;width:100%;">
    <div style="text-align:right;margin-bottom:2px;"><button class="btn ghost sm" id="login-lang-toggle" onclick="toggleLang()">EN</button></div>
    <div class="title" style="margin-bottom:4px;">🏭 Legacy Warehouse</div>
    <div class="sub" style="margin-bottom:16px;" data-i18n="teamAccess">Acceso del equipo</div>
    <label data-i18n="email">Correo</label><input id="l-email" type="email" autocomplete="username">
    <label data-i18n="pass">Contraseña</label><input id="l-pass" type="password" autocomplete="current-password">
    <div id="l-err" style="color:var(--red);font-size:13px;min-height:18px;margin:8px 0;"></div>
    <button class="btn" style="width:100%;" onclick="doLogin()" data-i18n="enter">Entrar</button>
  </div>
</div>

<div id="app" class="wrap" style="display:none;">
  <div class="head">
    <div><div class="title">🏭 Warehouse</div><div class="sub" id="who"></div></div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="btn ghost sm" id="lang-toggle" onclick="toggleLang()">EN</button>
      <button class="btn ghost sm" onclick="doLogout()" data-i18n="logout">Salir</button>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>

  <!-- ===================== CAPTURA ===================== -->
  <div id="view-yard" style="display:none;">
    <div class="card" style="margin-bottom:14px;">
      <div style="font-weight:800;margin-bottom:6px;" data-i18n="addCar">➕ Carro a desmantelar</div>
      <label>VIN</label>
      <div class="row2">
        <input id="v-vin" data-i18n-ph="vinPh" placeholder="1FT... (17 dígitos)" style="text-transform:uppercase;">
        <button class="btn ghost sm" style="flex:0 0 auto;" onclick="decodeVin()" data-i18n="decodeBtn">🔎 Decodificar VIN</button>
      </div>
      <div id="v-decode-msg" class="sub" style="margin-top:4px;"></div>
      <div class="row2" style="margin-top:6px;">
        <div><label data-i18n="year">Año</label><input id="v-year"></div>
        <div><label data-i18n="make">Marca</label><input id="v-make"></div>
        <div><label data-i18n="model">Modelo</label><input id="v-model"></div>
      </div>
      <div class="row2">
        <div><label data-i18n="miles">Millas (si se sabe)</label><input id="v-miles" type="number" inputmode="numeric" placeholder="145000"></div>
        <div><label data-i18n="engine">Motor (opcional)</label><input id="v-engine"></div>
      </div>
      <div class="row2">
        <div><label data-i18n="color">Color</label><input id="v-color" data-i18n-ph="colorPh" placeholder="Ej. Blanco"></div>
        <div><label data-i18n="colorCode">Código de color (opc.)</label><input id="v-colorcode"></div>
      </div>
      <button class="btn" style="width:100%;margin-top:12px;" id="v-save" onclick="saveVehicle()" data-i18n="saveCar">Guardar carro</button>
    </div>
    <div style="font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--faint);margin:8px 2px;" data-i18n="carsDismantling">Carros en desmantelamiento</div>
    <div id="veh-list"></div>
  </div>

  <!-- ===================== LISTADO ===================== -->
  <div id="view-lister" style="display:none;">
    <div class="sub" style="margin-bottom:10px;" data-i18n="listerHint">Partes listas para publicar.</div>
    <input id="lister-search" data-i18n-ph="searchPartPh" placeholder="🔎 Buscar parte / carro…" oninput="renderLister()" style="margin-bottom:12px;">
    <div id="lister-list"></div>
  </div>

  <!-- ===================== EMPAQUE ===================== -->
  <div id="view-pack" style="display:none;">
    <div class="card" style="margin-bottom:12px;">
      <div style="font-weight:800;margin-bottom:6px;" data-i18n="scanTitle">📦 Escanear / buscar parte</div>
      <div class="sub" style="margin-bottom:8px;" data-i18n="scanHint">Escanea el QR para ver dónde está.</div>
      <div class="row2">
        <input id="scan-input" data-i18n-ph="scanPh" placeholder="Escanea o pega el código…" onkeydown="if(event.key==='Enter')scanLookup()">
        <button class="btn sm" style="flex:0 0 auto;" onclick="scanLookup()" data-i18n="searchBtn">Buscar</button>
      </div>
      <button class="btn ghost sm" style="margin-top:8px;" onclick="startCamScan()" data-i18n="scanCam">📷 Escanear con cámara</button>
      <video id="cam" playsinline style="display:none;width:100%;border-radius:10px;margin-top:8px;"></video>
    </div>
    <div id="pack-result"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDrCMJQclGosVp3EV49vmwKDnji-Oti5j0",
  authDomain: "legacy-motors-garage.firebaseapp.com",
  projectId: "legacy-motors-garage",
  storageBucket: "legacy-motors-garage.firebasestorage.app",
  messagingSenderId: "783567672493",
  appId: "1:783567672493:web:3a825f2f59ec1c25e9a224"
};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app); const storage=getStorage(app); const auth=getAuth(app);

// ================= IDIOMA / LANGUAGE =================
const T={
  es:{ installApp:'📲 Instalar Warehouse como app', teamAccess:'Acceso del equipo', email:'Correo', pass:'Contraseña', enter:'Entrar', logout:'Salir',
    needEmailPass:'Escribe correo y contraseña', loginBad:'Correo o contraseña incorrectos', loginMany:'Demasiados intentos, espera.', noAccess:'Esta cuenta no tiene acceso a Warehouse.',
    roleOwner:'Dueño', roleWh:'Almacén', roleYard:'Captura', roleLister:'Listado', rolePack:'Empaque',
    tabCapture:'🔧 Captura', tabList:'🏷️ Listado', tabPack:'📦 Empaque',
    addCar:'➕ Carro a desmantelar', decodeBtn:'🔎 Decodificar VIN', year:'Año', make:'Marca', model:'Modelo', miles:'Millas (si se sabe)', engine:'Motor (opcional)', color:'Color', colorCode:'Código de color (opc.)', saveCar:'Guardar carro', savingCar:'Guardando…', carsDismantling:'Carros en desmantelamiento', noCarsYet:'Aún no hay carros. Agrega uno arriba ↑', car:'Carro', part:'parte(s)',
    vinPh:'1FT... (17 dígitos)', colorPh:'Ej. Blanco', whichPartPh:'Ej. Manija delantera izquierda', oemPh:'OEM #', rackPh:'Ej. A3', toperPh:'Ej. 14', searchPartPh:'🔎 Buscar parte / carro…', scanPh:'Escanea o pega el código…',
    addPart:'➕ Agregar parte', whichPart:'¿Qué parte es?', condition:'Condición', partNum:'# de parte (opc.)', rack:'Rack', toper:'Toper #', photos:'📷 Fotos de la parte', savePart:'Guardar parte + generar QR', savingPart:'Guardando…', savingPhotos:'Subiendo fotos…', genQR:'Generando QR…', partsCount:'Partes', noPartsYet:'Sin partes todavía.', photosReady:'foto(s) lista(s)',
    seeQR:'⬇️ Ver/descargar QR', tagSold:'Vendido', tagPublished:'Publicado', tagAvailable:'Disponible', noLoc:'sin ubicación',
    listerHint:'Partes listas para publicar. Toca una para copiar los campos, ver precios "sold" y marcar publicada.', noToPublish:'No hay partes por publicar.', ebayTitleLbl:'Título eBay:', copy:'Copiar', copied:'¡Copiado!', seeSold:'💲 Ver "sold" en eBay', markPublished:'✓ Marcar publicada', markSold:'Marcar vendida', priceAsk:'¿A qué precio la publicaste? (opcional, en $)', confirmSold:'¿Marcar esta parte como vendida?',
    scanTitle:'📦 Escanear / buscar parte', scanHint:'Escanea el QR (o pega/teclea el código) para ver dónde está y cambiar su ubicación.', searchBtn:'Buscar', scanCam:'📷 Escanear con cámara', saveNewLoc:'Guardar nueva ubicación', notFoundPart:'No encontré esa parte.', codeLbl:'Código', locSaved:'✓ Ubicación guardada', noCamera:'Este dispositivo no soporta escaneo por cámara. Usa el lector físico o teclea el código.', camErr:'No se pudo abrir la cámara: ', installHint:'Para instalar: menú del navegador (⋮) → "Agregar a inicio" / "Instalar app".',
    alertPart:'Escribe qué parte es.', alertCar:'Pon al menos VIN o marca/modelo.', carNotFound:'Carro no encontrado.', vinShort:'El VIN se ve corto (deben ser ~17).', decoding:'Decodificando…', decodeOk:'✓ Datos rellenados — revisa y corrige si hace falta.', decodeNone:'No se encontró info de ese VIN; captura a mano.', decodeErr:'No se pudo decodificar (sin internet o VIN inválido). Captura a mano.', error:'Error: ' },
  en:{ installApp:'📲 Install Warehouse as app', teamAccess:'Team access', email:'Email', pass:'Password', enter:'Sign in', logout:'Log out',
    needEmailPass:'Enter email and password', loginBad:'Wrong email or password', loginMany:'Too many attempts, wait.', noAccess:'This account has no access to Warehouse.',
    roleOwner:'Owner', roleWh:'Warehouse', roleYard:'Capture', roleLister:'Listing', rolePack:'Packing',
    tabCapture:'🔧 Capture', tabList:'🏷️ Listing', tabPack:'📦 Packing',
    addCar:'➕ Car to dismantle', decodeBtn:'🔎 Decode VIN', year:'Year', make:'Make', model:'Model', miles:'Miles (if known)', engine:'Engine (optional)', color:'Color', colorCode:'Color code (opt.)', saveCar:'Save car', savingCar:'Saving…', carsDismantling:'Cars being dismantled', noCarsYet:'No cars yet. Add one above ↑', car:'Car', part:'part(s)',
    vinPh:'1FT... (17 digits)', colorPh:'e.g. White', whichPartPh:'e.g. Front left door handle', oemPh:'OEM #', rackPh:'e.g. A3', toperPh:'e.g. 14', searchPartPh:'🔎 Search part / car…', scanPh:'Scan or paste the code…',
    addPart:'➕ Add part', whichPart:'What part is it?', condition:'Condition', partNum:'Part # (opt.)', rack:'Rack', toper:'Bin #', photos:'📷 Part photos', savePart:'Save part + generate QR', savingPart:'Saving…', savingPhotos:'Uploading photos…', genQR:'Generating QR…', partsCount:'Parts', noPartsYet:'No parts yet.', photosReady:'photo(s) ready',
    seeQR:'⬇️ View/download QR', tagSold:'Sold', tagPublished:'Published', tagAvailable:'Available', noLoc:'no location',
    listerHint:'Parts ready to list. Tap one to copy the fields, see "sold" prices and mark as published.', noToPublish:'No parts to publish.', ebayTitleLbl:'eBay title:', copy:'Copy', copied:'Copied!', seeSold:'💲 See "sold" on eBay', markPublished:'✓ Mark published', markSold:'Mark sold', priceAsk:'What price did you list it at? (optional, in $)', confirmSold:'Mark this part as sold?',
    scanTitle:'📦 Scan / find part', scanHint:'Scan the QR (or paste/type the code) to see where it is and change its location.', searchBtn:'Search', scanCam:'📷 Scan with camera', saveNewLoc:'Save new location', notFoundPart:"Couldn't find that part.", codeLbl:'Code', locSaved:'✓ Location saved', noCamera:'This device does not support camera scanning. Use the hardware scanner or type the code.', camErr:'Could not open camera: ', installHint:'To install: browser menu (⋮) → "Add to Home screen" / "Install app".',
    alertPart:'Type what part it is.', alertCar:'Enter at least VIN or make/model.', carNotFound:'Car not found.', vinShort:'The VIN looks short (should be ~17).', decoding:'Decoding…', decodeOk:'✓ Filled in — review and fix if needed.', decodeNone:'No info found for that VIN; enter by hand.', decodeErr:'Could not decode (no internet or invalid VIN). Enter by hand.', error:'Error: ' }
};
let L = localStorage.getItem('lmg_lang_pref') || (String(navigator.language||'').toLowerCase().startsWith('es') ? 'es' : 'en');
function t(k){ return (T[L] && T[L][k]!==undefined) ? T[L][k] : (T.es[k]!==undefined?T.es[k]:k); }
window.toggleLang = function(){ setLang(L==='es'?'en':'es'); };
function setLang(l){
  L = (l==='en') ? 'en' : 'es';
  localStorage.setItem('lmg_lang_pref', L);
  document.documentElement.lang = L;
  document.querySelectorAll('#lang-toggle,#login-lang-toggle').forEach(b=>{ if(b) b.textContent=(L==='es')?'EN':'ES'; });
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent = t(el.getAttribute('data-i18n')); });
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{ el.setAttribute('placeholder', t(el.getAttribute('data-i18n-ph'))); });
  if(document.getElementById('who') && myEmail) document.getElementById('who').textContent = myEmail+' · '+roleLabel(role);
  buildTabs();
  if(_view==='yard') renderVehicles();
  if(_view==='lister') renderLister();
}

// Condiciones bilingües (se guarda el valor en inglés para eBay)
const CONDS=[
  {v:'Used - Excellent', es:'Usado - Excelente', en:'Used - Excellent'},
  {v:'Used - Good',      es:'Usado - Bueno',     en:'Used - Good'},
  {v:'Used - Fair',      es:'Usado - Regular',   en:'Used - Fair'},
  {v:'For parts / Not working', es:'Para partes / No funciona', en:'For parts / Not working'},
  {v:'New (NOS)',        es:'Nuevo (NOS)',        en:'New (NOS)'}
];
function condOptions(){ return CONDS.map(c=>`<option value="${c.v}">${L==='en'?c.en:c.es}</option>`).join(''); }
function condLabel(v){ const c=CONDS.find(x=>x.v===v); return c?(L==='en'?c.en:c.es):(v||''); }

// ---- PWA: service worker + botón instalar ----
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw-warehouse.js').catch(e=>console.log('sw',e)); }
let _deferredPrompt=null;
window.addEventListener('beforeinstallprompt', e=>{ e.preventDefault(); _deferredPrompt=e; const b=document.getElementById('install-bar'); if(b) b.style.display=''; });
window.addEventListener('appinstalled', ()=>{ const b=document.getElementById('install-bar'); if(b) b.style.display='none'; _deferredPrompt=null; });
window.installApp=async function(){
  if(_deferredPrompt){ _deferredPrompt.prompt(); await _deferredPrompt.userChoice; _deferredPrompt=null; const b=document.getElementById('install-bar'); if(b) b.style.display='none'; }
  else { alert(t('installHint')); }
};

// ---- ROLES por correo ----
const ROLE_BY_EMAIL={
  'ev@legacymotorsgarage.com':'owner',
  'ivan.garcia@legacymotorsgarage.com':'owner',
  'warehouse@legacymotorsgarage.com':'warehouse',
  'yarda@legacymotorsgarage.com':'yard',
  'ebay@legacymotorsgarage.com':'lister',
  'empaque@legacymotorsgarage.com':'packager'
};
let role='', myEmail='';
let vehicles=[], parts=[], _selVeh='';

// ---- AUTH ----
window.doLogin=async function(){
  const email=(document.getElementById('l-email').value||'').trim().toLowerCase();
  const pass=document.getElementById('l-pass').value; const err=document.getElementById('l-err'); err.textContent='';
  if(!email||!pass){ err.textContent=t('needEmailPass'); return; }
  try{ await signInWithEmailAndPassword(auth,email,pass); }
  catch(e){ err.textContent = (e.code==='auth/too-many-requests')?t('loginMany'):t('loginBad'); }
};
window.doLogout=function(){ signOut(auth); };

onAuthStateChanged(auth,(user)=>{
  const email=((user&&user.email)||'').toLowerCase();
  role = user ? (ROLE_BY_EMAIL[email]||'') : '';
  myEmail = email;
  if(user && role){
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('who').textContent = email+' · '+roleLabel(role);
    buildTabs();
    if(!_listening){ _listening=true; startListening(); }
    setView(role==='owner'?'yard':(role==='yard'?'yard':role==='lister'?'lister':'pack'));
  } else {
    document.getElementById('app').style.display='none';
    document.getElementById('login').style.display='flex';
    if(user && !role){ document.getElementById('l-err').textContent=t('noAccess'); signOut(auth); }
  }
});
function roleLabel(r){ return r==='owner'?t('roleOwner'):r==='warehouse'?t('roleWh'):r==='yard'?t('roleYard'):r==='lister'?t('roleLister'):r==='packager'?t('rolePack'):''; }

// ---- TABS ----
let _view='yard';
function buildTabs(){
  const box=document.getElementById('tabs');
  if(role!=='owner' && role!=='warehouse'){ box.style.display='none'; return; }
  box.style.display='flex';
  box.innerHTML=[['yard',t('tabCapture')],['lister',t('tabList')],['pack',t('tabPack')]]
    .map(([k,l])=>`<div class="tab${_view===k?' on':''}" onclick="setView('${k}')">${l}</div>`).join('');
}
window.setView=function(k){
  _view=k; buildTabs();
  document.getElementById('view-yard').style.display   = k==='yard'?'':'none';
  document.getElementById('view-lister').style.display = k==='lister'?'':'none';
  document.getElementById('view-pack').style.display   = k==='pack'?'':'none';
  if(k==='yard') renderVehicles();
  if(k==='lister') renderLister();
};

// ---- DATA ----
let _listening=false;
function startListening(){
  onSnapshot(collection(db,'dismantle_vehicles'), s=>{ vehicles=s.docs.map(d=>({id:d.id,...d.data()})); if(_view==='yard') renderVehicles(); }, e=>console.log('veh',e));
  onSnapshot(collection(db,'parts'), s=>{ parts=s.docs.map(d=>({id:d.id,...d.data()})); if(_view==='yard') renderVehicles(); if(_view==='lister') renderLister(); }, e=>console.log('parts',e));
}

// ---- VIN decode (NHTSA) ----
window.decodeVin=async function(){
  const vin=(document.getElementById('v-vin').value||'').trim().toUpperCase();
  const msg=document.getElementById('v-decode-msg');
  if(vin.length<11){ msg.textContent=t('vinShort'); return; }
  msg.textContent=t('decoding');
  try{
    const r=await fetch('https://vpic.nhtsa.dot.gov/api/vehicles/decodevin/'+encodeURIComponent(vin)+'?format=json');
    const j=await r.json(); const g=k=>{ const it=(j.Results||[]).find(x=>x.Variable===k); return (it&&it.Value)||''; };
    const year=g('Model Year'), make=g('Make'), model=g('Model'), engine=[g('Displacement (L)'),g('Engine Number of Cylinders')&&g('Engine Number of Cylinders')+' cyl',g('Fuel Type - Primary')].filter(Boolean).join(' ');
    if(year) document.getElementById('v-year').value=year;
    if(make) document.getElementById('v-make').value=titleCase(make);
    if(model) document.getElementById('v-model').value=titleCase(model);
    if(engine) document.getElementById('v-engine').value=engine.trim();
    msg.textContent = (year||make||model) ? t('decodeOk') : t('decodeNone');
  }catch(e){ msg.textContent=t('decodeErr'); }
};
function titleCase(s){ return String(s||'').toLowerCase().replace(/\b\w/g,c=>c.toUpperCase()); }

window.saveVehicle=async function(){
  const vin=(document.getElementById('v-vin').value||'').trim().toUpperCase();
  const year=document.getElementById('v-year').value.trim(), make=titleCase(document.getElementById('v-make').value.trim()), model=titleCase(document.getElementById('v-model').value.trim());
  if(!make&&!model&&!vin){ alert(t('alertCar')); return; }
  const btn=document.getElementById('v-save'); btn.disabled=true; btn.textContent=t('savingCar');
  const id='veh_'+Date.now()+'_'+Math.random().toString(36).slice(2,5);
  try{
    await setDoc(doc(db,'dismantle_vehicles',id), { entryId:id, vin, year, make, model,
      miles:document.getElementById('v-miles').value.trim(),
      engine:document.getElementById('v-engine').value.trim(), color:titleCase(document.getElementById('v-color').value.trim()), colorCode:document.getElementById('v-colorcode').value.trim().toUpperCase(),
      status:'desmantelando', createdAt:new Date().toISOString(), createdBy:myEmail });
    ['v-vin','v-year','v-make','v-model','v-miles','v-engine','v-color','v-colorcode'].forEach(x=>document.getElementById(x).value='');
    document.getElementById('v-decode-msg').textContent='';
    _selVeh=id;
  }catch(e){ alert(t('error')+e.message); }
  btn.disabled=false; btn.textContent=t('saveCar');
};

function vehLabel(v){ return [v.year,v.make,v.model].filter(Boolean).join(' ')||('VIN '+(v.vin||'').slice(-6))||t('car'); }
function renderVehicles(){
  const box=document.getElementById('veh-list'); if(!box) return;
  const list=vehicles.slice().sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
  if(!list.length){ box.innerHTML='<div class="sub" style="padding:8px 2px;">'+t('noCarsYet')+'</div>'; return; }
  box.innerHTML=list.map(v=>{
    const vp=parts.filter(p=>p.vehicleId===v.id);
    const open=_selVeh===v.id;
    let inner='';
    if(open){
      inner='<div style="border-top:1px solid var(--border);margin-top:10px;padding-top:10px;">'+addPartFormHtml(v.id)+
        '<div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--faint);margin:12px 2px 6px;">'+t('partsCount')+' ('+vp.length+')</div>'+
        (vp.length?vp.slice().sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||'')).map(partCardHtml).join(''):'<div class="sub">'+t('noPartsYet')+'</div>')+'</div>';
    }
    return `<div class="card" style="margin-bottom:8px;">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;cursor:pointer;" onclick="selVeh('${v.id}')">
        <div><div style="font-weight:800;">${vehLabel(v)}</div><div class="sub">${v.color||''}${v.miles?' · '+Number(v.miles).toLocaleString()+' mi':''}${v.vin?' · VIN '+v.vin.slice(-6):''} · ${vp.length} ${t('part')}</div></div>
        <span class="gold">${open?'▾':'▸'}</span>
      </div>${inner}</div>`;
  }).join('');
}
window.selVeh=function(id){ _selVeh=(_selVeh===id?'':id); renderVehicles(); };

function addPartFormHtml(vid){
  return `<div style="font-weight:700;margin-bottom:4px;">${t('addPart')}</div>
    <label>${t('whichPart')}</label><input id="p-name-${vid}" placeholder="${t('whichPartPh')}">
    <div class="row2">
      <div><label>${t('condition')}</label><select id="p-cond-${vid}">${condOptions()}</select></div>
      <div><label>${t('partNum')}</label><input id="p-num-${vid}" placeholder="${t('oemPh')}"></div>
    </div>
    <div class="row2">
      <div><label>${t('rack')}</label><input id="p-rack-${vid}" placeholder="${t('rackPh')}"></div>
      <div><label>${t('toper')}</label><input id="p-toper-${vid}" placeholder="${t('toperPh')}"></div>
    </div>
    <label>${t('photos')}</label>
    <input type="file" id="p-photos-${vid}" accept="image/*" multiple onchange="partPhotoPreview('${vid}')">
    <div id="p-prev-${vid}" class="thumbs"></div>
    <button class="btn" style="width:100%;margin-top:10px;" id="p-save-${vid}" onclick="savePart('${vid}')">${t('savePart')}</button>`;
}
window.partPhotoPreview=function(vid){
  const inp=document.getElementById('p-photos-'+vid), box=document.getElementById('p-prev-'+vid);
  const n=(inp.files||[]).length; box.innerHTML = n?('<span class="chip">📷 '+n+' '+t('photosReady')+'</span>'):'';
};

async function toJpeg(file){
  try{
    const img=await new Promise((res,rej)=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=rej; i.src=URL.createObjectURL(file); });
    const max=1400, sc=Math.min(1,max/Math.max(img.width,img.height));
    const c=document.createElement('canvas'); c.width=Math.round(img.width*sc); c.height=Math.round(img.height*sc);
    c.getContext('2d').drawImage(img,0,0,c.width,c.height);
    const blob=await new Promise(r=>c.toBlob(r,'image/jpeg',0.82));
    return new File([blob],(file.name||'foto').replace(/\.\w+$/,'')+'.jpg',{type:'image/jpeg'});
  }catch(e){ return file; }
}
async function qrDataUrl(text){
  if(!window.qrcode){ await new Promise((res,rej)=>{ const s=document.createElement('script'); s.src='https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js'; s.onload=res; s.onerror=rej; document.head.appendChild(s); }); }
  const qr=window.qrcode(0,'M'); qr.addData(text); qr.make(); return qr.createDataURL(6,8);
}

window.savePart=async function(vid){
  const name=(document.getElementById('p-name-'+vid).value||'').trim();
  if(!name){ alert(t('alertPart')); return; }
  const v=vehicles.find(x=>x.id===vid); if(!v){ alert(t('carNotFound')); return; }
  const btn=document.getElementById('p-save-'+vid); btn.disabled=true; btn.textContent=t('savingPart');
  const id='part_'+Date.now()+'_'+Math.random().toString(36).slice(2,5);
  try{
    const files=Array.from(document.getElementById('p-photos-'+vid).files||[]);
    const photoURLs=[];
    for(const f of files){ btn.textContent=t('savingPhotos'); const jpg=await toJpeg(f); const r=ref(storage,'parts/'+id+'/'+Date.now()+'_'+(jpg.name||'foto.jpg')); await uploadBytes(r,jpg); photoURLs.push(await getDownloadURL(r)); }
    btn.textContent=t('genQR');
    const durl=await qrDataUrl(id);
    const blob=await (await fetch(durl)).blob();
    const qrRef=ref(storage,'parts/'+id+'/00_QR.gif'); await uploadBytes(qrRef, blob);
    const qrURL=await getDownloadURL(qrRef);
    photoURLs.unshift(qrURL);
    const cond=document.getElementById('p-cond-'+vid).value;
    const num=(document.getElementById('p-num-'+vid).value||'').trim();
    const rack=(document.getElementById('p-rack-'+vid).value||'').trim().toUpperCase();
    const toper=(document.getElementById('p-toper-'+vid).value||'').trim();
    const ebayTitle=[v.year,v.make,v.model,name,(num?'OEM '+num:''), '-', cond].filter(Boolean).join(' ').replace(' - -',' -');
    await setDoc(doc(db,'parts',id), { entryId:id, vehicleId:vid, vehicleLabel:vehLabel(v),
      vYear:v.year||'', vMake:v.make||'', vModel:v.model||'', vMiles:v.miles||'',
      name, partNumber:num, condition:cond, notes:'', photoURLs, qrURL, ebayTitle,
      status:'disponible', priceCents:null, location:{rack,toper},
      createdAt:new Date().toISOString(), createdBy:myEmail });
    ['p-name-','p-num-','p-rack-','p-toper-'].forEach(p=>{ const el=document.getElementById(p+vid); if(el) el.value=''; });
    document.getElementById('p-photos-'+vid).value=''; document.getElementById('p-prev-'+vid).innerHTML='';
  }catch(e){ alert(t('error')+e.message); }
  btn.disabled=false; btn.textContent=t('savePart');
};

function statusTag(s){ return s==='vendido'?'<span class="tag vend">'+t('tagSold')+'</span>':s==='publicado'?'<span class="tag public">'+t('tagPublished')+'</span>':'<span class="tag dispon">'+t('tagAvailable')+'</span>'; }
function locText(p){ const l=p.location||{}; return (l.rack||l.toper)?('Rack '+(l.rack||'?')+' · '+t('toper')+' '+(l.toper||'?')):t('noLoc'); }
function partCardHtml(p){
  const fotos=(p.photoURLs||[]).slice(0,5).map(u=>`<img src="${u}">`).join('');
  return `<div class="part">
    <div style="display:flex;justify-content:space-between;gap:8px;"><div style="font-weight:700;">${p.name}</div>${statusTag(p.status)}</div>
    <div class="sub">${condLabel(p.condition)}${p.partNumber?' · OEM '+p.partNumber:''} · 📍 ${locText(p)}</div>
    <div class="thumbs">${fotos}</div>
    <div style="margin-top:6px;"><a href="${p.qrURL}" target="_blank">${t('seeQR')}</a></div>
  </div>`;
}

// ===================== LISTADO =====================
window.renderLister=function(){
  const box=document.getElementById('lister-list'); if(!box) return;
  const q=(document.getElementById('lister-search')?document.getElementById('lister-search').value:'').trim().toLowerCase();
  let list=parts.filter(p=>p.status!=='vendido');
  if(q){ const w=q.split(/\s+/); list=list.filter(p=>{ const hay=((p.name||'')+' '+(p.vehicleLabel||'')+' '+(p.partNumber||'')).toLowerCase(); return w.every(x=>hay.indexOf(x)>=0); }); }
  list.sort((a,b)=>(a.status==='disponible'?0:1)-(b.status==='disponible'?0:1) || (b.createdAt||'').localeCompare(a.createdAt||''));
  if(!list.length){ box.innerHTML='<div class="sub">'+t('noToPublish')+'</div>'; return; }
  box.innerHTML=list.map(p=>{
    const sold='https://www.ebay.com/sch/i.html?_nkw='+encodeURIComponent([p.vYear,p.vMake,p.vModel,p.name].filter(Boolean).join(' '))+'&LH_Sold=1&LH_Complete=1';
    const fotos=(p.photoURLs||[]).slice(0,5).map(u=>`<img src="${u}">`).join('');
    return `<div class="part">
      <div style="display:flex;justify-content:space-between;gap:8px;"><div style="font-weight:700;">${p.vehicleLabel} · ${p.name}</div>${statusTag(p.status)}</div>
      <div class="sub">${condLabel(p.condition)}${p.partNumber?' · OEM '+p.partNumber:''} · 📍 ${locText(p)}</div>
      <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px;margin-top:8px;font-size:13px;">
        <b>${t('ebayTitleLbl')}</b> ${p.ebayTitle||''}
        <button class="btn ghost sm" style="margin-left:6px;" onclick="copyText(this,'${(p.ebayTitle||'').replace(/'/g,"\\'")}')">${t('copy')}</button>
      </div>
      <div class="thumbs">${fotos}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;">
        <a class="btn green sm" href="${sold}" target="_blank" style="text-decoration:none;">${t('seeSold')}</a>
        ${p.status==='disponible'?`<button class="btn sm" onclick="markPublished('${p.id}')">${t('markPublished')}</button>`:`<button class="btn ghost sm" onclick="markSold('${p.id}')">${t('markSold')}</button>`}
      </div>
    </div>`;
  }).join('');
};
window.copyText=function(btn,txt){ navigator.clipboard&&navigator.clipboard.writeText(txt); btn.textContent=t('copied'); setTimeout(()=>btn.textContent=t('copy'),1200); };
window.markPublished=async function(id){
  const priceStr=prompt(t('priceAsk')); const price=priceStr?Math.round(Number(priceStr)*100):null;
  try{ await updateDoc(doc(db,'parts',id), price!=null&&!isNaN(price)?{status:'publicado',priceCents:price}:{status:'publicado'}); }catch(e){ alert(t('error')+e.message); }
};
window.markSold=async function(id){ if(!confirm(t('confirmSold'))) return; try{ await updateDoc(doc(db,'parts',id),{status:'vendido',soldAt:new Date().toISOString()}); }catch(e){ alert(t('error')+e.message);} };

// ===================== EMPAQUE =====================
window.scanLookup=function(){
  const raw=(document.getElementById('scan-input').value||'').trim();
  if(!raw) return;
  let id=raw; const m=raw.match(/part[=/]([\w-]+)/); if(m) id=m[1];
  const p=parts.find(x=>x.id===id || x.entryId===id);
  const box=document.getElementById('pack-result');
  if(!p){ box.innerHTML='<div class="card"><div class="red">'+t('notFoundPart')+'</div><div class="sub">'+t('codeLbl')+': '+raw+'</div></div>'; return; }
  box.innerHTML=`<div class="card">
    <div style="display:flex;justify-content:space-between;gap:8px;"><div style="font-weight:800;">${p.vehicleLabel} · ${p.name}</div>${statusTag(p.status)}</div>
    <div class="sub" style="margin:6px 0;">${condLabel(p.condition)}${p.partNumber?' · OEM '+p.partNumber:''}</div>
    <div style="font-size:16px;font-weight:800;color:var(--gold);margin:6px 0;">📍 ${locText(p)}</div>
    <div class="row2">
      <div><label>${t('rack')}</label><input id="pk-rack" value="${(p.location&&p.location.rack)||''}"></div>
      <div><label>${t('toper')}</label><input id="pk-toper" value="${(p.location&&p.location.toper)||''}"></div>
    </div>
    <button class="btn" style="width:100%;margin-top:10px;" onclick="saveLoc('${p.id}')">${t('saveNewLoc')}</button>
    ${p.status!=='vendido'?`<button class="btn ghost sm" style="width:100%;margin-top:8px;" onclick="markSold('${p.id}')">${t('markSold')}</button>`:''}
  </div>`;
  document.getElementById('scan-input').value='';
};
window.saveLoc=async function(id){
  const rack=(document.getElementById('pk-rack').value||'').trim().toUpperCase(), toper=(document.getElementById('pk-toper').value||'').trim();
  try{ await updateDoc(doc(db,'parts',id),{location:{rack,toper}}); document.getElementById('pack-result').innerHTML='<div class="card green">'+t('locSaved')+': Rack '+(rack||'?')+' · '+t('toper')+' '+(toper||'?')+'</div>'; }
  catch(e){ alert(t('error')+e.message); }
};
let _camStream=null;
window.startCamScan=async function(){
  const vid=document.getElementById('cam');
  if(!('BarcodeDetector' in window)){ alert(t('noCamera')); return; }
  try{
    _camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    vid.srcObject=_camStream; vid.style.display=''; await vid.play();
    const det=new window.BarcodeDetector({formats:['qr_code']});
    const tick=async()=>{
      if(!_camStream) return;
      try{ const codes=await det.detect(vid); if(codes&&codes.length){ document.getElementById('scan-input').value=codes[0].rawValue; stopCam(); scanLookup(); return; } }catch(e){}
      requestAnimationFrame(tick);
    }; tick();
  }catch(e){ alert(t('camErr')+e.message); }
};
function stopCam(){ const vid=document.getElementById('cam'); if(_camStream){ _camStream.getTracks().forEach(t=>t.stop()); _camStream=null; } vid.style.display='none'; }

// Aplicar idioma inicial (traduce estáticos + pone el toggle)
setLang(L);

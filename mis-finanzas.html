<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>Mis Finanzas — Privado</title>
<style>
  :root{ --bg:#0b0e14; --surface:#141924; --surface2:#1b2130; --border:#2a3141; --text:#e7e9ee; --muted:#9aa3b4; --gold:#f0c040; --gold2:#d9a92b; --green:#3ecf8e; --red:#e56a6a; --blue:#5b9dff; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,system-ui,Segoe UI,Roboto,sans-serif; padding-bottom:calc(30px + env(safe-area-inset-bottom)); }
  .wrap{ max-width:820px; margin:0 auto; padding:0 14px; }
  .topbar{ position:sticky; top:0; z-index:10; background:linear-gradient(180deg,#0b0e14,rgba(11,14,20,.92)); backdrop-filter:blur(6px); padding:calc(12px + env(safe-area-inset-top)) 14px 10px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--border); }
  .topbar h1{ font-size:17px; margin:0; flex:1; font-weight:800; letter-spacing:.3px; } .topbar .lock{ color:var(--gold); }
  .btn{ background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:10px; padding:9px 13px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; }
  .btn.gold{ background:var(--gold); color:#0b0e14; border-color:var(--gold); }
  .btn.sm{ padding:6px 10px; font-size:12px; }
  .btn.ghost{ background:transparent; }
  .nav{ display:flex; gap:7px; overflow-x:auto; padding:12px 0 4px; -webkit-overflow-scrolling:touch; }
  .nav button{ flex:0 0 auto; background:var(--surface); border:1px solid var(--border); color:var(--muted); border-radius:20px; padding:8px 14px; font-size:13px; font-weight:700; cursor:pointer; }
  .nav button.on{ background:var(--gold); color:#0b0e14; border-color:var(--gold); }
  .card{ background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px; margin:12px 0; }
  .card h2{ font-size:15px; margin:0 0 10px; display:flex; align-items:center; gap:8px; }
  .row{ display:flex; justify-content:space-between; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); }
  .row:last-child{ border-bottom:none; }
  .row .l{ min-width:0; } .row .l b{ font-size:14px; } .row .l .s{ font-size:12px; color:var(--muted); margin-top:2px; }
  .row .r{ text-align:right; flex:0 0 auto; } .row .r b{ font-size:15px; } .row .r .s{ font-size:11px; margin-top:2px; }
  .pos{ color:var(--green); } .neg{ color:var(--red); } .mut{ color:var(--muted); }
  .kpis{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .kpi{ background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:12px; }
  .kpi .t{ font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; } .kpi .v{ font-size:22px; font-weight:800; margin-top:4px; }
  .addbtn{ width:100%; margin-top:10px; }
  .empty{ color:var(--muted); font-size:13px; padding:8px 0; }
  .iconbtn{ background:none; border:none; color:var(--muted); font-size:16px; cursor:pointer; padding:4px 6px; }
  /* modal */
  #ov{ position:fixed; inset:0; z-index:100; background:rgba(0,0,0,.6); display:none; align-items:flex-end; justify-content:center; }
  #ov.on{ display:flex; }
  #sheet{ background:var(--surface); border:1px solid var(--border); border-radius:18px 18px 0 0; width:100%; max-width:560px; max-height:88vh; overflow-y:auto; padding:18px 16px calc(18px + env(safe-area-inset-bottom)); }
  #sheet h3{ margin:0 0 12px; font-size:16px; }
  .fld{ margin-bottom:11px; } .fld label{ display:block; font-size:12px; color:var(--muted); margin-bottom:4px; font-weight:700; }
  .fld input,.fld select{ width:100%; background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:11px 12px; color:var(--text); font-size:16px; outline:none; font-family:inherit; }
  .login{ max-width:360px; margin:14vh auto 0; padding:24px; text-align:center; }
  .login .logo{ font-size:42px; } .login h1{ font-size:20px; margin:8px 0 18px; }
  #app{ display:none; }
  .asof{ font-size:11px; color:var(--muted); }
  @media print{ .topbar,.nav,.addbtn,.iconbtn,.no-print,#ov{ display:none !important; } body{ background:#fff; color:#000; } .card{ border-color:#ccc; break-inside:avoid; } }
</style>
</head>
<body>

<div id="login" class="login">
  <div class="logo">🔐</div>
  <h1>Mis Finanzas — Privado</h1>
  <div class="fld"><input id="lg-email" type="email" autocomplete="username" placeholder="Correo"></div>
  <div class="fld"><input id="lg-pass" type="password" autocomplete="current-password" placeholder="Contraseña" onkeydown="if(event.key==='Enter')doLogin()"></div>
  <button class="btn gold" style="width:100%;" onclick="doLogin()">Entrar</button>
  <div id="lg-msg" style="color:var(--red);font-size:13px;margin-top:12px;"></div>
  <div class="mut" style="font-size:11px;margin-top:18px;">Página privada. Solo el dueño.</div>
</div>

<div id="app">
  <div class="topbar">
    <span class="lock">🔒</span>
    <h1>Mis Finanzas</h1>
    <button class="btn sm ghost" onclick="refreshPrices()" id="px-btn">🔄 Precios</button>
    <button class="btn sm ghost" onclick="logout()">Salir</button>
  </div>
  <div class="wrap">
    <div class="nav" id="nav"></div>
    <div id="view"></div>
  </div>
</div>

<div id="ov" onclick="if(event.target===this)closeSheet()"><div id="sheet"></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-functions.js";

const firebaseConfig = { apiKey:"AIzaSyDrCMJQclGosVp3EV49vmwKDnji-Oti5j0", authDomain:"legacy-motors-garage.firebaseapp.com", projectId:"legacy-motors-garage", storageBucket:"legacy-motors-garage.firebasestorage.app", messagingSenderId:"783567672493", appId:"1:783567672493:web:3a825f2f59ec1c25e9a224" };
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);
const functions=getFunctions(app);
const OWNER='ev@legacymotorsgarage.com';
const REF=doc(db,'private_finance','ev');

const CG={ BTC:'bitcoin', ETH:'ethereum', SOL:'solana', DOGE:'dogecoin', ADA:'cardano', XRP:'ripple', BNB:'binancecoin', LTC:'litecoin', MATIC:'matic-network', AVAX:'avalanche-2', DOT:'polkadot', LINK:'chainlink', SHIB:'shiba-inu' };
const DEF={ crypto:[], stocks:[], cash:0, cards:[], insurance:[], expenses:[], income:[], coRevenue:[], coExpenses:[] };
let D=JSON.parse(JSON.stringify(DEF)), prices={crypto:{},stocks:{},at:''}, section='resumen', unsub=null;

const uid=()=> 'x'+Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36);
const num=(v)=>{ const n=parseFloat(String(v).replace(/[^0-9.\-]/g,'')); return isNaN(n)?0:n; };
const fmt=(n)=>'$'+Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmt0=(n)=>'$'+Number(n||0).toLocaleString('en-US',{maximumFractionDigits:0});
const esc=(s)=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const sum=(arr,k)=>(arr||[]).reduce((a,x)=>a+num(x[k]),0);

// ---------- AUTH ----------
window.doLogin=async function(){
  const em=(document.getElementById('lg-email').value||'').trim(), pw=document.getElementById('lg-pass').value||'';
  document.getElementById('lg-msg').textContent='';
  try{ await signInWithEmailAndPassword(auth,em,pw); }
  catch(e){ document.getElementById('lg-msg').textContent='Correo o contraseña incorrectos.'; }
};
window.logout=()=>signOut(auth);
onAuthStateChanged(auth,(user)=>{
  const em=((user&&user.email)||'').toLowerCase();
  if(user && em===OWNER){
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='block';
    start();
  }else{
    if(user && em!==OWNER){ document.getElementById('lg-msg').textContent='Esta cuenta no tiene acceso.'; signOut(auth); }
    document.getElementById('login').style.display='block';
    document.getElementById('app').style.display='none';
    if(unsub){ unsub(); unsub=null; }
  }
});
function start(){
  if(unsub) return;
  unsub=onSnapshot(REF,(snap)=>{
    const d=snap.exists()?snap.data():{};
    D=Object.assign(JSON.parse(JSON.stringify(DEF)), d);
    for(const k in DEF){ if(!Array.isArray(D[k]) && Array.isArray(DEF[k])) D[k]=DEF[k].slice(); }
    render();
  },(e)=>{ console.warn('finance',e); });
  buildNav();
  refreshPrices();
}
async function save(){ try{ await setDoc(REF, D); }catch(e){ alert('No se pudo guardar: '+e.message); } }

// ---------- PRICES ----------
window.refreshPrices=async function(){
  const btn=document.getElementById('px-btn'); if(btn) btn.textContent='…';
  try{
    const cg=[...new Set(D.crypto.map(c=>c.cgId).filter(Boolean))];
    const sy=[...new Set(D.stocks.map(s=>(s.symbol||'').toUpperCase()).filter(Boolean))];
    if(cg.length||sy.length){ const r=await httpsCallable(functions,'marketQuotes')({crypto:cg,stocks:sy}); prices=r.data||prices; }
  }catch(e){ /* precios no disponibles ahora */ }
  if(btn) btn.textContent='🔄 Precios';
  render();
};
const cgPrice=(c)=> prices.crypto[c.cgId] || 0;
const syPrice=(s)=> prices.stocks[(s.symbol||'').toUpperCase()] || 0;

// ---------- CALCS ----------
function calc(){
  const cryptoVal=D.crypto.reduce((a,c)=>a+num(c.amount)*(cgPrice(c)||num(c.buyPrice)),0);
  const cryptoCost=D.crypto.reduce((a,c)=>a+num(c.amount)*num(c.buyPrice),0);
  const stockVal=D.stocks.reduce((a,s)=>a+num(s.shares)*(syPrice(s)||num(s.buyPrice)),0);
  const stockCost=D.stocks.reduce((a,s)=>a+num(s.shares)*num(s.buyPrice),0);
  const invVal=cryptoVal+stockVal, invCost=cryptoCost+stockCost;
  const cash=num(D.cash);
  const debt=sum(D.cards,'balance');
  const assets=cash+invVal;
  const net=assets-debt;
  const income=sum(D.income,'amount');
  const expenses=sum(D.expenses,'amount')+sum(D.insurance,'premium');
  const monthly=income-expenses;
  const coRev=sum(D.coRevenue,'amount'), coExp=sum(D.coExpenses,'amount');
  return { cryptoVal,cryptoCost,stockVal,stockCost,invVal,invCost,cash,debt,assets,net,income,expenses,monthly,coRev,coExp,coNet:coRev-coExp };
}

// ---------- NAV / RENDER ----------
const SECTIONS=[['resumen','📊 Resumen'],['crypto','₿ Cripto'],['stocks','📈 Acciones'],['cards','💳 Tarjetas'],['insurance','🛡️ Seguro'],['expenses','🧾 Gastos'],['income','💰 Ingresos'],['company','🏢 Empresa']];
function buildNav(){ document.getElementById('nav').innerHTML=SECTIONS.map(([k,l])=>`<button data-k="${k}" class="${k===section?'on':''}" onclick="go('${k}')">${l}</button>`).join(''); }
window.go=(k)=>{ section=k; buildNav(); render(); window.scrollTo(0,0); };

function render(){ const v=document.getElementById('view'); if(!v) return; v.innerHTML=({resumen:vResumen,crypto:vCrypto,stocks:vStocks,cards:vCards,insurance:vInsurance,expenses:vExpenses,income:vIncome,company:vCompany}[section]||vResumen)(); }

function rowsHtml(list, mapFn, addLabel, addKey){
  const body = list.length ? list.map(mapFn).join('') : `<div class="empty">Nada todavía.</div>`;
  return body + `<button class="btn gold sm addbtn" onclick="addRow('${addKey}')">➕ ${addLabel}</button>`;
}
function itemRow(sec, it, main, sub, right, rightSub){
  return `<div class="row"><div class="l"><b>${main}</b><div class="s">${sub||''}</div></div>
    <div class="r"><b>${right||''}</b><div class="s mut">${rightSub||''}</div>
      <div style="margin-top:2px;"><button class="iconbtn" onclick="editRow('${sec}','${it.id}')">✏️</button><button class="iconbtn" onclick="delRow('${sec}','${it.id}')">🗑️</button></div>
    </div></div>`;
}

// ---- RESUMEN ----
function gl(val,cost){ const g=val-cost; const pct=cost>0?(g/cost*100):0; const cls=g>=0?'pos':'neg'; return `<span class="${cls}">${g>=0?'+':''}${fmt(g)} (${g>=0?'+':''}${pct.toFixed(1)}%)</span>`; }
function vResumen(){
  const c=calc();
  const cards=[...D.cards].sort((a,b)=>num(a.dueDay)-num(b.dueDay));
  const dueHtml = cards.length ? cards.map(k=>`<div class="row"><div class="l"><b>${esc(k.name)}</b><div class="s">Día ${esc(k.dueDay)||'—'} de cada mes</div></div><div class="r"><b class="neg">${fmt(num(k.balance))}</b><div class="s mut">${k.limit?('límite '+fmt0(num(k.limit))):''}</div></div></div>`).join('') : '<div class="empty">Sin tarjetas.</div>';
  return `
  <div class="card">
    <h2>📊 Patrimonio neto</h2>
    <div class="kpis">
      <div class="kpi"><div class="t">Patrimonio neto</div><div class="v ${c.net>=0?'pos':'neg'}">${fmt0(c.net)}</div></div>
      <div class="kpi"><div class="t">Inversiones hoy</div><div class="v">${fmt0(c.invVal)}</div></div>
      <div class="kpi"><div class="t">Efectivo / ahorros</div><div class="v">${fmt0(c.cash)}</div></div>
      <div class="kpi"><div class="t">Deuda tarjetas</div><div class="v neg">${fmt0(c.debt)}</div></div>
    </div>
    <div class="row" style="margin-top:8px;"><div class="l"><b>Ganancia/pérdida inversiones</b><div class="s">vs. lo que invertiste (${fmt(c.invCost)})</div></div><div class="r"><b>${gl(c.invVal,c.invCost)}</b></div></div>
    <div class="asof" style="margin-top:6px;">Precios: ${prices.at?('actualizado '+new Date(prices.at).toLocaleString('es-MX')):'toca 🔄 Precios'}</div>
  </div>
  <div class="card">
    <h2>💵 Estado de resultados — Personal (mensual)</h2>
    <div class="row"><div class="l"><b>Ingresos</b></div><div class="r"><b class="pos">${fmt(c.income)}</b></div></div>
    <div class="row"><div class="l"><b>Gastos</b><div class="s">incluye seguros</div></div><div class="r"><b class="neg">${fmt(c.expenses)}</b></div></div>
    <div class="row"><div class="l"><b>Neto al mes</b></div><div class="r"><b class="${c.monthly>=0?'pos':'neg'}">${fmt(c.monthly)}</b></div></div>
  </div>
  <div class="card">
    <h2>🏢 Estado de resultados — Empresa (mensual)</h2>
    <div class="row"><div class="l"><b>Ingresos</b></div><div class="r"><b class="pos">${fmt(c.coRev)}</b></div></div>
    <div class="row"><div class="l"><b>Gastos</b></div><div class="r"><b class="neg">${fmt(c.coExp)}</b></div></div>
    <div class="row"><div class="l"><b>Utilidad</b></div><div class="r"><b class="${c.coNet>=0?'pos':'neg'}">${fmt(c.coNet)}</b></div></div>
    <div class="asof" style="margin-top:6px;">Por ahora se captura a mano en la pestaña 🏢 Empresa. Después lo conectamos a Finanzas para que jale solo.</div>
  </div>
  <div class="card">
    <h2>📆 Próximos pagos de tarjetas</h2>
    ${dueHtml}
  </div>
  <button class="btn gold no-print" style="width:100%;margin:6px 0 20px;" onclick="window.print()">🖨️ Generar reporte (PDF/imprimir)</button>`;
}

// ---- CRYPTO ----
function vCrypto(){
  const body=rowsHtml(D.crypto,(c)=>{ const p=cgPrice(c), val=num(c.amount)*(p||num(c.buyPrice)), cost=num(c.amount)*num(c.buyPrice);
    return itemRow('crypto',c, esc(c.coin||c.cgId), `${num(c.amount)} · compra ${fmt(num(c.buyPrice))}${p?(' · hoy '+fmt(p)):' · precio pendiente'}`, fmt(val), gl(val,cost)); },'Agregar cripto','crypto');
  return `<div class="card"><h2>₿ Cripto</h2>${body}</div>`+cashCard();
}
// ---- STOCKS ----
function vStocks(){
  const body=rowsHtml(D.stocks,(s)=>{ const p=syPrice(s), val=num(s.shares)*(p||num(s.buyPrice)), cost=num(s.shares)*num(s.buyPrice);
    return itemRow('stocks',s, esc((s.symbol||'').toUpperCase()), `${num(s.shares)} acc · compra ${fmt(num(s.buyPrice))}${p?(' · hoy '+fmt(p)):' · precio pendiente'}`, fmt(val), gl(val,cost)); },'Agregar acción','stocks');
  return `<div class="card"><h2>📈 Acciones / Bolsa</h2>${body}</div>`+cashCard();
}
function cashCard(){ return `<div class="card"><h2>💵 Efectivo / Ahorros</h2><div class="row"><div class="l"><b>Total en efectivo/banco</b><div class="s">para el patrimonio neto</div></div><div class="r"><b>${fmt(num(D.cash))}</b><div style="margin-top:2px;"><button class="iconbtn" onclick="editCash()">✏️</button></div></div></div></div>`; }
window.editCash=async function(){ const v=prompt('Efectivo / ahorros totales ($):', D.cash||0); if(v==null) return; D.cash=num(v); await save(); };

// ---- CARDS ----
function vCards(){
  const body=rowsHtml(D.cards,(k)=>itemRow('cards',k, esc(k.name), `Día de pago ${esc(k.dueDay)||'—'}${k.apr?(' · '+esc(k.apr)+'% APR'):''}`, fmt(num(k.balance)), k.limit?('límite '+fmt0(num(k.limit))):''),'Agregar tarjeta','cards');
  return `<div class="card"><h2>💳 Tarjetas de crédito</h2>${body}</div>`;
}
// ---- INSURANCE ----
function vInsurance(){
  const body=rowsHtml(D.insurance,(i)=>itemRow('insurance',i, esc(i.policy||i.provider), `${esc(i.provider||'')}${i.coverage?(' · '+esc(i.coverage)):''}${i.renewDate?(' · renueva '+esc(i.renewDate)):''}`, i.premium?fmt(num(i.premium)):'', i.premium?'/mes':''),'Agregar póliza','insurance');
  return `<div class="card"><h2>🛡️ Seguros</h2>${body}</div>`;
}
// ---- EXPENSES ----
function vExpenses(){
  const body=rowsHtml(D.expenses,(e)=>itemRow('expenses',e, esc(e.name), esc(e.category||''), fmt(num(e.amount)), '/mes'),'Agregar gasto','expenses');
  return `<div class="card"><h2>🧾 Gastos mensuales</h2>${body}<div class="row" style="border-top:1px solid var(--border);margin-top:6px;"><div class="l"><b>Total</b></div><div class="r"><b class="neg">${fmt(sum(D.expenses,'amount'))}</b></div></div></div>`;
}
// ---- INCOME ----
function vIncome(){
  const body=rowsHtml(D.income,(e)=>itemRow('income',e, esc(e.name), '', fmt(num(e.amount)), '/mes'),'Agregar ingreso','income');
  return `<div class="card"><h2>💰 Ingresos mensuales</h2>${body}<div class="row" style="border-top:1px solid var(--border);margin-top:6px;"><div class="l"><b>Total</b></div><div class="r"><b class="pos">${fmt(sum(D.income,'amount'))}</b></div></div></div>`;
}
// ---- COMPANY ----
function vCompany(){
  const rev=rowsHtml(D.coRevenue,(e)=>itemRow('coRevenue',e, esc(e.name), '', fmt(num(e.amount)), '/mes'),'Agregar ingreso','coRevenue');
  const exp=rowsHtml(D.coExpenses,(e)=>itemRow('coExpenses',e, esc(e.name), '', fmt(num(e.amount)), '/mes'),'Agregar gasto','coExpenses');
  const net=sum(D.coRevenue,'amount')-sum(D.coExpenses,'amount');
  return `<div class="card"><h2>🏢 Empresa — Ingresos</h2>${rev}</div>
  <div class="card"><h2>🏢 Empresa — Gastos</h2>${exp}</div>
  <div class="card"><h2>📋 Utilidad de la empresa</h2><div class="row"><div class="l"><b>Utilidad mensual</b></div><div class="r"><b class="${net>=0?'pos':'neg'}">${fmt(net)}</b></div></div><div class="asof" style="margin-top:6px;">Captura manual por ahora. Siguiente fase: conectarlo con Finanzas (carros, partes, eBay, gastos) para que se llene solo.</div></div>`;
}

// ---------- FORMS ----------
const FIELDS={
  crypto:[['coin','Moneda (ej. BTC, ETH)','text'],['amount','Cantidad','number'],['buyPrice','Precio de compra (por unidad $)','number'],['buyDate','Fecha de compra','date']],
  stocks:[['symbol','Símbolo (ej. AAPL, TSLA)','text'],['shares','Acciones','number'],['buyPrice','Precio de compra ($)','number'],['buyDate','Fecha de compra','date']],
  cards:[['name','Nombre de la tarjeta','text'],['balance','Saldo actual ($)','number'],['limit','Límite ($)','number'],['dueDay','Día de pago (1-31)','number'],['apr','APR %','number']],
  insurance:[['policy','Póliza / nombre','text'],['provider','Aseguradora','text'],['coverage','Cobertura','text'],['premium','Prima mensual ($)','number'],['renewDate','Renovación','date']],
  expenses:[['name','Gasto','text'],['amount','Monto mensual ($)','number'],['category','Categoría','text']],
  income:[['name','Ingreso','text'],['amount','Monto mensual ($)','number']],
  coRevenue:[['name','Ingreso','text'],['amount','Monto mensual ($)','number']],
  coExpenses:[['name','Gasto','text'],['amount','Monto mensual ($)','number']],
};
const TITLES={crypto:'cripto',stocks:'acción',cards:'tarjeta',insurance:'póliza',expenses:'gasto',income:'ingreso',coRevenue:'ingreso de empresa',coExpenses:'gasto de empresa'};
window.addRow=(sec)=>openForm(sec,null);
window.editRow=(sec,id)=>openForm(sec,(D[sec]||[]).find(x=>x.id===id)||null);
window.delRow=async function(sec,id){ if(!confirm('¿Borrar?')) return; D[sec]=(D[sec]||[]).filter(x=>x.id!==id); await save(); };
function openForm(sec, existing){
  const flds=FIELDS[sec]||[];
  const sheet=document.getElementById('sheet');
  sheet.innerHTML=`<h3>${existing?'Editar':'Agregar'} ${TITLES[sec]||''}</h3>`+
    flds.map(([k,l,t])=>`<div class="fld"><label>${l}</label><input id="f-${k}" type="${t}" ${t==='number'?'inputmode="decimal"':''} value="${existing?esc(existing[k]==null?'':existing[k]):''}"></div>`).join('')+
    `<div style="display:flex;gap:8px;margin-top:6px;"><button class="btn ghost" style="flex:1;" onclick="closeSheet()">Cancelar</button><button class="btn gold" style="flex:2;" onclick="saveForm('${sec}','${existing?existing.id:''}')">Guardar</button></div>`;
  document.getElementById('ov').classList.add('on');
}
window.closeSheet=()=>document.getElementById('ov').classList.remove('on');
window.saveForm=async function(sec,id){
  const flds=FIELDS[sec]||[]; const obj={ id: id||uid() };
  flds.forEach(([k])=>{ obj[k]=(document.getElementById('f-'+k).value||'').trim(); });
  if(sec==='crypto'){ const tk=(obj.coin||'').toUpperCase(); obj.cgId=CG[tk]||(obj.coin||'').toLowerCase().replace(/\s+/g,'-'); }
  if(sec==='stocks'){ obj.symbol=(obj.symbol||'').toUpperCase(); }
  D[sec]=D[sec]||[];
  if(id){ const i=D[sec].findIndex(x=>x.id===id); if(i>=0) D[sec][i]=obj; else D[sec].push(obj); } else D[sec].push(obj);
  await save(); closeSheet(); refreshPrices();
};
</script>
